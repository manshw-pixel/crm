 * HEALTH SCORE LOGIC
 * ----------------------------------------------------------------------------
 * score = w.usage*usage + w.sentiment*sentiment + w.tickets*ticketScore
 *       + w.recency*recencyScore + w.nps*npsNorm          (weights sum to 1)
 *
 *   usage, sentiment : stored per-account, 0..100
 *   ticketScore      : 100 - min(openTickets*10, 100)
 *   recencyScore     : 100 if last activity <=7 days ago, linear to 0 at 60d
 *   npsNorm          : (nps + 100) / 2   (NPS -100..100 -> 0..100)
 *
 * Risk: score >=70 Green | 40..69 Yellow | <40 Red
 *

const QBR_FREQ_MONTHS = { Quarterly: 3, "Semi-annual": 6, Annual: 12 };
const addMonths = (dateStr, m) => { const d = new Date(dateStr); d.setMonth(d.getMonth() + m); return iso(d.getTime()); };
/* null = QBRs not applicable (churned, or no frequency and no date set) */
function qbrStatus(a) {
  if (a.churn) return null;
  const hasFreq = a.qbrFrequency && a.qbrFrequency !== "None";
  if (!hasFreq && !a.nextQbrDate) return null;
  if (!a.nextQbrDate) return { kind: "unscheduled" };
  const d = daysUntil(a.nextQbrDate);
  return d < 0 ? { kind: "overdue", d: -d } : d <= 30 ? { kind: "due", d } : { kind: "scheduled", d };
}

const DEFAULT_WEIGHTS = { usage: 30, sentiment: 20, tickets: 15, recency: 20, nps: 15 };
const WEIGHT_LABELS = { usage: "Product usage", sentiment: "Sentiment", tickets: "Support tickets", recency: "Engagement recency", nps: "NPS" };
const INPUT_RANGE = { usage: [0, 100], sentiment: [0, 100], tickets: [0, 50], nps: [-100, 100] };
const DEFAULT_INPUTS = { usage: 70, sentiment: 70, tickets: 0, nps: 0 };
/* keep health inputs numeric and in range — drops blanks/NaN, clamps the rest */
const clampInputs = raw => {
  const out = {};
  Object.keys(INPUT_RANGE).forEach(k => {
    const n = parseFloat(raw?.[k]);
    if (!isNaN(n)) { const [lo, hi] = INPUT_RANGE[k]; out[k] = Math.min(hi, Math.max(lo, n)); }
  });
  return out;
};

function lastActivityDate(accountId, activities) {
  const a = activities.filter(x => x.accountId === accountId).sort((x, y) => y.date.localeCompare(x.date));
  return a.length ? a[0].date : null;
}
function scoreComponents(acct, activities) {
  const la = lastActivityDate(acct.id, activities);
  const ds = la ? daysSince(la) : 999;
  const inp = { ...DEFAULT_INPUTS, ...clampInputs(acct.inputs) }; // tolerate missing/bad stored inputs
  return {
    usage: inp.usage,
    sentiment: inp.sentiment,
    tickets: 100 - Math.min(inp.tickets * 10, 100),
    recency: ds <= 7 ? 100 : ds >= 60 ? 0 : Math.round(100 * (1 - (ds - 7) / 53)),
    nps: Math.round((inp.nps + 100) / 2),
  };
}
function healthScore(acct, activities, weights) {
  const c = scoreComponents(acct, activities);
  const tw = Object.values(weights).reduce((a, b) => a + b, 0) || 1;
  return Math.round(Object.keys(weights).reduce((s, k) => s + (weights[k] / tw) * (c[k] ?? 0), 0));
}
const riskOf = s => (s >= 70 ? "Green" : s >= 40 ? "Yellow" : "Red");

function flagsFor(acct, activities, score) {
  if (acct.churn) return [];
  const f = [];
  const la = lastActivityDate(acct.id, activities);
  if ((!la || daysSince(la) >= 30) && daysSince(acct.startDate) >= 30) f.push("No activity 30d+");
  const dr = daysUntil(acct.renewalDate);
  if (dr >= 0 && dr < 60) f.push(`Renewal in ${dr}d`);
  const old = (acct.history || []).filter(h => daysSince(h.d) >= 25);
  if (old.length && old[old.length - 1].s - score >= 10) f.push(`Health ↓${old[old.length - 1].s - score}`);
  const iu = daysSince(acct.inputsUpdatedAt || acct.startDate);
  if (iu >= 45) f.push(`Inputs stale ${iu}d`);
  return f;
}

/* ------------------------------ audit trail ------------------------------ */
const AUDIT_FIELDS = ["arr", "renewalDate", "csm", "tier", "contractStatus", "renewalStage"];
/* one entry per audited field the patch really changes (numbers normalized) */
function auditChanges(a, patch, by, source) {
  const out = [];
  AUDIT_FIELDS.forEach(f => {
    if (!(f in patch)) return;
    const from = f === "arr" ? (+a[f] || 0) : (a[f] ?? "");
    const to = f === "arr" ? (+patch[f] || 0) : (patch[f] ?? "");
    if (from !== to) out.push({ id: uid(), date: iso(Date.now()), field: f, from, to, by: by || "unknown", source: source || "edit form" });
  });
  return out;
}
const withAudit = (a, entries) => entries.length ? { ...a, audit: [...(a.audit || []), ...entries] } : a;

const dbError = (where, error) => { console.error(where, error); alert(`Save failed (${where}): ${error.message}\nYour last change may not be shared — reload to resync.`); };

async function fetchAll() {
  const res = await Promise.all([
    ...ENTITY_TABLES.map(t => sb.from(t).select("data")),
    sb.from("settings").select("data").eq("id", 1),
    sb.from("profiles").select("id,name,role"),
  ]);
  const bad = res.find(r => r.error);
  if (bad) throw bad.error;
  const [ac, co, act, ta, op, se] = res.slice(0, 6).map(r => r.data.map(x => x.data));
  ac.forEach(a => { if (!a.currency) a.currency = "USD"; });
  // one-time migration: give every account a stable numeric account # (used by CSV import to dedupe)
  let maxNo = ac.reduce((m, a) => Math.max(m, +a.accountNo || 0), 0);
  ac.filter(a => !a.accountNo).forEach(a => {
    a.accountNo = ++maxNo;
    sb.from("accounts").upsert({ id: a.id, data: a, updated_at: new Date().toISOString() }).then(({ error }) => error && dbError("accounts", error));
  });
  const saved = (se && se[0]) || {};
  return {
    accounts: ac, contacts: co, activities: act, tasks: ta, opportunities: op,
    team: res[6].data || [],
    settings: { weights: { ...DEFAULT_WEIGHTS, ...(saved.weights || {}) }, rates: { ...DEFAULT_RATES, ...(saved.rates || {}) },
      integrations: { processed: {}, log: [], ...(saved.integrations || {}) }, snapshots: saved.snapshots || [], playbook: saved.playbook },
  };
}

/* write-through: mirror a just-reduced action into Supabase */
function persist(action, next) {
  const up = (t, item) => sb.from(t).upsert({ id: item.id, data: item, updated_at: new Date().toISOString() }).then(({ error }) => error && dbError(t, error));
  switch (action.type) {
    case "ADD_ACCOUNT": { const a = next.accounts.find(x => x.id === action.item.id); return up("accounts", a || action.item); }
    case "ADD_CONTACT": return up("contacts", action.item);
    case "ADD_OPP": return up("opportunities", action.item);
    case "ADD_ACTIVITY": {
      if (action.item.type === "QBR") { const a = next.accounts.find(x => x.id === action.item.accountId); if (a && QBR_FREQ_MONTHS[a.qbrFrequency]) up("accounts", a); }
      return up("activities", action.item);
    }
    case "ADD_TASK": return up("tasks", action.item);
    case "SEED_PLAYBOOK": { action.items.forEach(t => up("tasks", t)); const a = next.accounts.find(x => x.id === action.id); return a && up("accounts", a); }
    case "TOGGLE_TASK": case "EDIT_TASK": { const t = next.tasks.find(x => x.id === action.id); return t && up("tasks", t); }
    case "EDIT_ACTIVITY": { const x = next.activities.find(v => v.id === action.id); return x && up("activities", x); }
    case "UPDATE_INPUTS": case "EDIT_ACCOUNT": case "COMPLETE_RENEWAL": case "CHURN_ACCOUNT": case "REACTIVATE_ACCOUNT": case "ADJUST_ARR": case "ADD_DOCUMENT": case "DELETE_DOCUMENT": { const a = next.accounts.find(x => x.id === action.id); return a && up("accounts", a); }
    case "SET_OPP_STAGE": { const o = next.opportunities.find(x => x.id === action.id); return o && up("opportunities", o); }
    case "DELETE_ACCOUNT":
      sb.from("accounts").delete().eq("id", action.id).then(({ error }) => error && dbError("accounts", error));
      ["contacts", "activities", "tasks", "opportunities"].forEach(t =>
        sb.from(t).delete().eq("data->>accountId", action.id).then(({ error }) => error && dbError(t, error)));
      // orphaned subs (parent just deleted) need their cleared parentId written back
      next.accounts.filter(a => a._orphaned).forEach(a => { delete a._orphaned; up("accounts", a); });
      return;
    case "SET_WEIGHTS": case "SET_RATES": case "SET_INTEGRATIONS": case "SET_SNAPSHOTS": case "SET_PLAYBOOK":
      return sb.from("settings").upsert({ id: 1, data: next.settings, updated_at: new Date().toISOString() }).then(({ error }) => error && dbError("settings", error));
  }
}

/* bulk replace (sample data / clear / JSON import) — admin only, RLS enforced */
async function replaceAllRemote(state) {
  for (const t of ENTITY_TABLES) {
    const { error } = await sb.from(t).delete().neq("id", "");
    if (error) throw error;
  }
  const key = { accounts: "accounts", contacts: "contacts", activities: "activities", tasks: "tasks", opportunities: "opportunities" };
  for (const t of ENTITY_TABLES) {
    const rows = state[key[t]].map(item => ({ id: item.id, data: item }));
    if (rows.length) { const { error } = await sb.from(t).insert(rows); if (error) throw error; }
  }
  const { error } = await sb.from("settings").upsert({ id: 1, data: state.settings });
  if (error) throw error;
}
function reducer(state, action) {
  switch (action.type) {
    case "REPLACE": return action.state;
    case "ADD_ACCOUNT": { const item = action.item.accountNo ? action.item
      : { ...action.item, accountNo: state.accounts.reduce((m, a) => Math.max(m, +a.accountNo || 0), 0) + 1 };
      return { ...state, accounts: [...state.accounts, item] }; }
    case "EDIT_ACCOUNT": return { ...state, accounts: state.accounts.map(a => {
      if (a.id !== action.id) return a;
      const entries = auditChanges(a, action.patch, action.by, action.source);
      let upd = withAudit({ ...a, ...action.patch }, entries);
      const arrCh = entries.find(x => x.field === "arr");
      if (arrCh) upd = { ...upd, arrEvents: [...(a.arrEvents || []), { id: uid(), date: iso(Date.now()),
        delta: arrCh.to - arrCh.from, kind: arrCh.to > arrCh.from ? "expansion" : "contraction",
        source: action.source === "csv import" ? "import" : "edit", reason: "ARR edited", note: "", by: arrCh.by }] };
      return upd;
    }) };
    case "COMPLETE_RENEWAL": return { ...state, accounts: state.accounts.map(a => a.id === action.id
      ? withAudit({ ...a, renewalDate: action.newDate, arr: action.newArr, contractStatus: "Active", billingCompleted: false, billingCompletedDate: null, renewalStage: "Not started", renewals: [...(a.renewals || []), action.entry] },
          [ ...((+a.arr || 0) !== (+action.newArr || 0) ? [{ id: uid(), date: iso(Date.now()), field: "arr", from: +a.arr || 0, to: +action.newArr || 0, by: action.entry.by, source: "renewal" }] : []),
            ...(a.renewalDate !== action.newDate ? [{ id: uid(), date: iso(Date.now()), field: "renewalDate", from: a.renewalDate, to: action.newDate, by: action.entry.by, source: "renewal" }] : []) ])
      : a) };
    case "CHURN_ACCOUNT": return { ...state, accounts: state.accounts.map(a => a.id === action.id
      ? withAudit({ ...a, contractStatus: "Churned", churn: action.entry },
          [{ id: uid(), date: iso(Date.now()), field: "contractStatus", from: a.contractStatus, to: "Churned", by: action.entry.by, source: "churn" }]) : a) };
    case "REACTIVATE_ACCOUNT": return { ...state, accounts: state.accounts.map(a => a.id === action.id
      ? withAudit({ ...a, contractStatus: "Active", churn: null },
          [{ id: uid(), date: iso(Date.now()), field: "contractStatus", from: a.contractStatus, to: "Active", by: action.by || "unknown", source: "reactivate" }]) : a) };
    case "ADJUST_ARR": return { ...state, accounts: state.accounts.map(a => a.id === action.id
      ? withAudit({ ...a, arr: action.newArr, arrEvents: [...(a.arrEvents || []), action.entry] },
          [{ id: uid(), date: iso(Date.now()), field: "arr", from: +a.arr || 0, to: +action.newArr || 0, by: action.entry.by, source: action.entry.source === "opportunity" ? "opportunity" : "adjustment" }]) : a) };
    case "ADD_DOCUMENT": return { ...state, accounts: state.accounts.map(a => {
      if (a.id !== action.id) return a;
      const label = `${action.doc.category}: ${action.doc.title || action.doc.name}`;
      return withAudit({ ...a, documents: [...(a.documents || []), action.doc] },
        [{ id: uid(), date: iso(Date.now()), field: "document", from: "", to: label, by: action.by || "unknown", source: action.source || "upload" }]);
    }) };
    case "DELETE_DOCUMENT": return { ...state, accounts: state.accounts.map(a => {
      if (a.id !== action.id) return a;
      const doc = (a.documents || []).find(d => d.id === action.docId);
      if (!doc) return a;
      const label = `${doc.category}: ${doc.title || doc.name}`;
      return withAudit({ ...a, documents: (a.documents || []).filter(d => d.id !== action.docId) },
        [{ id: uid(), date: iso(Date.now()), field: "document", from: label, to: "", by: action.by || "unknown", source: action.source || "delete" }]);
    }) };
    case "SET_OPP_STAGE": return { ...state, opportunities: state.opportunities.map(o => o.id === action.id ? { ...o, stage: action.stage } : o) };
    case "DELETE_ACCOUNT": return { ...state,
      // _orphaned marks subs whose parent was just deleted so persist() can write them back
      accounts: state.accounts.filter(a => a.id !== action.id).map(a => a.parentId === action.id ? { ...a, parentId: null, _orphaned: true } : a),
      contacts: state.contacts.filter(c => c.accountId !== action.id),
      activities: state.activities.filter(x => x.accountId !== action.id),
      tasks: state.tasks.filter(t => t.accountId !== action.id),
      opportunities: state.opportunities.filter(o => o.accountId !== action.id) };
    case "ADD_CONTACT": return { ...state, contacts: [...state.contacts, action.item] };
    case "ADD_OPP": return { ...state, opportunities: [...state.opportunities, action.item] };
    case "ADD_ACTIVITY": {
      let accounts = state.accounts;
      if (action.item.type === "QBR") { // logging a QBR schedules the next one per the account's cadence
        accounts = accounts.map(a => {
          if (a.id !== action.item.accountId) return a;
          const m = QBR_FREQ_MONTHS[a.qbrFrequency];
          return m ? { ...a, nextQbrDate: addMonths(action.item.date, m) } : a;
        });
      }
      return { ...state, accounts, activities: [...state.activities, action.item] };
    }
    case "EDIT_ACTIVITY": return { ...state, activities: state.activities.map(x => x.id === action.id ? { ...x, ...action.patch } : x) };
    case "ADD_TASK": return { ...state, tasks: [...state.tasks, action.item] };
    case "EDIT_TASK": return { ...state, tasks: state.tasks.map(t => t.id === action.id ? { ...t, ...action.patch } : t) };
    case "TOGGLE_TASK": return { ...state, tasks: state.tasks.map(t => t.id === action.id ? { ...t, status: t.status === "Done" ? "Open" : "Done" } : t) };
    case "UPDATE_INPUTS": {
      return { ...state, accounts: state.accounts.map(a => {
        if (a.id !== action.id) return a;
        const upd = { ...a, inputs: { ...a.inputs, ...clampInputs(action.inputs) }, inputsUpdatedAt: iso(Date.now()) };
        const s = healthScore(upd, state.activities, state.settings.weights);
        return { ...upd, history: [...(a.history || []), { d: iso(Date.now()), s }] };
      }) };
    }
    case "SET_WEIGHTS": return { ...state, settings: { ...state.settings, weights: action.weights } };
    case "SET_RATES": return { ...state, settings: { ...state.settings, rates: action.rates } };
    case "SET_INTEGRATIONS": return { ...state, settings: { ...state.settings, integrations: action.integrations } };
    case "SET_SNAPSHOTS": return { ...state, settings: { ...state.settings, snapshots: action.snapshots } };
    case "SET_PLAYBOOK": return { ...state, settings: { ...state.settings, playbook: action.playbook } };
    case "SEED_PLAYBOOK": return { ...state,
      tasks: [...state.tasks, ...action.items],
      accounts: state.accounts.map(a => a.id === action.id ? { ...a, playbookSeededFor: action.seededFor } : a) };
    default: return state;
  }
}

/* ----------------------------- tiny charts ----------------------------- */
function Sparkline({ points, w = 220, h = 48 }) {
  if (!points.length) return null;
  const vals = points.map(p => p.s);
  const min = Math.min(...vals, 0), max = Math.max(...vals, 100);
  const xy = points.map((p, i) => [8 + (i * (w - 16)) / Math.max(points.length - 1, 1), h - 6 - ((p.s - min) / (max - min || 1)) * (h - 12)]);
  const d = xy.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const last = points[points.length - 1].s;
  return (
    <svg width={w} height={h}>
      <path d={d} fill="none" stroke={RISK_HEX[riskOf(last)]} strokeWidth="2" />
      {xy.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill={RISK_HEX[riskOf(points[i].s)]} />)}
    </svg>
  );
}
function TrendLine({ label, points, months, fmt, w = 150, h = 28 }) {
  const vals = points.map(v => v === null || v === undefined ? null : +v);
  const nums = vals.filter(v => v !== null);
  if (!nums.length) return null;
  const min = Math.min(...nums), max = Math.max(...nums);
  const xy = vals.map((v, i) => v === null ? null : [4 + (i * (w - 8)) / Math.max(vals.length - 1, 1), h - 4 - ((v - min) / (max - min || 1)) * (h - 8)]).filter(Boolean);
  const d = xy.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const last = nums[nums.length - 1], first = nums[0];
  return (
    <div className="flex items-center gap-2" title={months.map((m, i) => `${m}: ${fmt(vals[i])}`).join("\n")}>
      <span className="w-28 shrink-0 text-xs text-slate-500">{label}</span>
      <svg width={w} height={h}><path d={d} fill="none" stroke={last >= first ? "#10b981" : "#f43f5e"} strokeWidth="2" />
        {xy.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="2" fill="#64748b" />)}</svg>
      <span className={`text-xs font-bold ${last >= first ? "text-emerald-600" : "text-rose-600"}`}>{fmt(last)}</span>
    </div>
  );
}
/* full line chart: gridlines, axis labels, hover tooltip (snapshots are monthly) */
function LineChart({ title, points, months, fmt, color = "#6366f1", w = 340, h = 160 }) {
  const [hov, setHov] = useState(null);
  const vals = points.map(v => v === null || v === undefined ? null : +v);
  const nums = vals.filter(v => v !== null);
  if (nums.length < 2) return null;
  const min = Math.min(...nums), max = Math.max(...nums);
  const padL = 44, padR = 10, padT = 14, padB = 22;
  const X = i => padL + (i * (w - padL - padR)) / Math.max(vals.length - 1, 1);
  const Y = v => padT + (1 - (v - min) / (max - min || 1)) * (h - padT - padB);
  const xy = vals.map((v, i) => v === null ? null : [X(i), Y(v)]);
  const d = xy.filter(Boolean).map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const ticks = [min, (min + max) / 2, max];
  const lblEvery = Math.ceil(months.length / 6);
  const move = e => {
    const box = e.currentTarget.getBoundingClientRect();
    const fx = (e.clientX - box.left) * (w / box.width);
    let best = 0; vals.forEach((v, i) => { if (v !== null && Math.abs(X(i) - fx) < Math.abs(X(best) - fx)) best = i; });
    setHov(vals[best] === null ? null : best);
  };
  return (
    <div>
      <div className="mb-1 text-xs font-bold text-slate-500">{title}</div>
      <svg viewBox={`0 0 ${w} ${h}`} className="w-full" onMouseMove={move} onMouseLeave={() => setHov(null)}>
        {ticks.map((t, i) => <g key={i}>
          <line x1={padL} x2={w - padR} y1={Y(t)} y2={Y(t)} stroke="#e2e8f0" strokeWidth="1" />
          <text x={padL - 4} y={Y(t) + 3} textAnchor="end" fontSize="9" fill="#94a3b8">{fmt(t)}</text>
        </g>)}
        {months.map((m, i) => i % lblEvery === 0 && <text key={m} x={X(i)} y={h - 8} textAnchor="middle" fontSize="9" fill="#94a3b8">{m.slice(2)}</text>)}
        <path d={d} fill="none" stroke={color} strokeWidth="2" />
        {xy.map((p, i) => p && <circle key={i} cx={p[0]} cy={p[1]} r={hov === i ? 4 : 2.5} fill={color} />)}
        {hov !== null && xy[hov] && <g>
          <line x1={xy[hov][0]} x2={xy[hov][0]} y1={padT} y2={h - padB} stroke="#cbd5e1" strokeDasharray="3 3" />
          <rect x={Math.min(xy[hov][0] + 6, w - 96)} y={padT} width="90" height="28" rx="4" fill="#0f172a" opacity="0.85" />
          <text x={Math.min(xy[hov][0] + 6, w - 96) + 6} y={padT + 12} fontSize="9" fill="#e2e8f0">{months[hov]}</text>
          <text x={Math.min(xy[hov][0] + 6, w - 96) + 6} y={padT + 23} fontSize="10" fontWeight="bold" fill="#fff">{fmt(vals[hov])}</text>
        </g>}
      </svg>
    </div>
  );
}
/* stacked bars of per-month counts (e.g. Green/Yellow/Red account mix) */
function StackedBars({ months, series, w = 340, h = 160 }) {
  const [hov, setHov] = useState(null);
  if (!months.length) return null;
  const totals = months.map((_, i) => series.reduce((s, sr) => s + (sr.values[i] || 0), 0));
  const max = Math.max(...totals, 1);
  const padL = 30, padR = 10, padT = 14, padB = 22;
  const bw = Math.min(24, ((w - padL - padR) / months.length) * 0.7);
  const X = i => padL + ((i + 0.5) * (w - padL - padR)) / months.length;
  const H = v => (v / max) * (h - padT - padB);
  const lblEvery = Math.ceil(months.length / 6);
  return (
    <div>
      <div className="mb-1 flex items-center gap-3 text-xs font-bold text-slate-500">Health mix (accounts)
        {series.map(sr => <span key={sr.label} className="flex items-center gap-1 font-normal"><span className="inline-block h-2 w-2 rounded-sm" style={{ background: sr.color }} />{sr.label}</span>)}
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} className="w-full" onMouseLeave={() => setHov(null)}>
        <text x={padL - 4} y={padT + 3} textAnchor="end" fontSize="9" fill="#94a3b8">{max}</text>
        <line x1={padL} x2={w - padR} y1={h - padB} y2={h - padB} stroke="#e2e8f0" />
        {months.map((m, i) => {
          let y = h - padB;
          return (
            <g key={m} onMouseEnter={() => setHov(i)}>
              {series.map(sr => { const bh = H(sr.values[i] || 0); y -= bh;
                return <rect key={sr.label} x={X(i) - bw / 2} y={y} width={bw} height={bh} fill={sr.color} opacity={hov === null || hov === i ? 1 : 0.4} />; })}
              {i % lblEvery === 0 && <text x={X(i)} y={h - 8} textAnchor="middle" fontSize="9" fill="#94a3b8">{m.slice(2)}</text>}
            </g>
          );
        })}
        {hov !== null && <g>
          <rect x={Math.min(X(hov) + 6, w - 120)} y={padT} width="114" height={14 + series.length * 11} rx="4" fill="#0f172a" opacity="0.85" />
          <text x={Math.min(X(hov) + 6, w - 120) + 6} y={padT + 11} fontSize="9" fill="#e2e8f0">{months[hov]} · {totals[hov]} accounts</text>
          {series.map((sr, si) => <text key={sr.label} x={Math.min(X(hov) + 6, w - 120) + 6} y={padT + 22 + si * 11} fontSize="9" fill={sr.color}>{sr.label}: {sr.values[hov] || 0}</text>)}
        </g>}
      </svg>
    </div>
  );
}
function DistBar({ counts }) {

/* ------------------------- attachments ------------------------- */
const MAX_FILE_MB = 10;
async function uploadFiles(fileList, accountId) {
  const out = [];
  for (const f of Array.from(fileList || [])) {
    if (f.size > MAX_FILE_MB * 1024 * 1024) throw new Error(`${f.name} is over ${MAX_FILE_MB} MB`);
    const path = `${accountId}/${Date.now()}-${f.name.replace(/[^\w.\-]+/g, "_")}`;
    const { error } = await sb.storage.from("attachments").upload(path, f);
    if (error) throw new Error(`${f.name}: ${error.message}`);
    const { data } = sb.storage.from("attachments").getPublicUrl(path);
    out.push({ name: f.name, url: data.publicUrl, path });
  }
  return out;
}

const DOC_CATEGORIES = ["Purchase Order", "Contract Agreement", "Advisory"];
const DOC_CATEGORY_PLURAL = { "Purchase Order": "Purchase Orders", "Contract Agreement": "Contract Agreements", "Advisory": "Advisories" };
const EXPIRY_WARN_DAYS = 60;
function DocumentForm({ acct, dispatch, user, onDone }) {
  const fileRef = useRef(null);
  const [category, setCategory] = useState(DOC_CATEGORIES[0]);
  const [title, setTitle] = useState("");
  const [amount, setAmount] = useState("");
  const [effectiveDate, setEffectiveDate] = useState("");
  const [expiryDate, setExpiryDate] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const submit = async e => {
    e.preventDefault();
    if (busy) return;
    const files = fileRef.current?.files;
    if (!files || !files.length) { setErr("Choose a file."); return; }
    setBusy(true); setErr("");
    try {
      const [uploaded] = await uploadFiles(files, acct.id);
      const doc = { id: uid(), category, title: title.trim(), name: uploaded.name, url: uploaded.url, path: uploaded.path,
        amount: Number.isFinite(+amount) && amount !== "" ? +amount : null, effectiveDate: effectiveDate || null, expiryDate: expiryDate || null,
        uploadedBy: user?.name || "unknown", uploadedAt: iso(Date.now()) };
      dispatch({ type: "ADD_DOCUMENT", id: acct.id, doc, by: user?.name, source: "upload" });
      onDone();
    } catch (ex) { setErr(ex.message || String(ex)); setBusy(false); }
  };
  return (
    <form onSubmit={submit} className="space-y-2">
      <div className="grid gap-2 sm:grid-cols-2">
        <Select value={category} onChange={e => setCategory(e.target.value)} options={DOC_CATEGORIES} />
        <Input placeholder="Title (optional)" value={title} onChange={e => setTitle(e.target.value)} />
        <Input type="number" placeholder="Amount (optional)" value={amount} onChange={e => setAmount(e.target.value)} />
        <input ref={fileRef} type="file" className="text-xs text-slate-700" />
        <label className="text-xs text-slate-500">Effective<Input type="date" value={effectiveDate} onChange={e => setEffectiveDate(e.target.value)} /></label>
        <label className="text-xs text-slate-500">Expiry<Input type="date" value={expiryDate} onChange={e => setExpiryDate(e.target.value)} /></label>
      </div>
      {err && <div className="text-xs font-semibold text-rose-600">{err}</div>}
      <div className="flex gap-2">
        <Btn kind="primary" type="submit">{busy ? "Uploading…" : "Upload document"}</Btn>
        <Btn onClick={onDone}>Cancel</Btn>
      </div>
    </form>
  );
}

function DocumentsCard({ a, dispatch, user, onAdd }) {

/* ------------------------------- Dashboard ------------------------------- */
/* trailing-12-month revenue retention (USD) from churn events, renewal deltas and ARR events */
function retentionStats(accounts, rates) {
  const yearAgo = Date.now() - 365 * DAY;
  let churnedARR = 0, expansion = 0, contraction = 0;
  accounts.forEach(a => {
    if (a.churn && new Date(a.churn.date).getTime() >= yearAgo) churnedARR += toUSD(a.churn.arr, a.churn.currency || a.currency, rates);
    (a.renewals || []).forEach(r => {
      if (new Date(r.completedOn).getTime() >= yearAgo) {
        const d = toUSD(r.arr - r.prevArr, a.currency, rates);
        if (d >= 0) expansion += d; else contraction -= d;
      }
    });
    (a.arrEvents || []).forEach(ev => { // won opportunities + manual ARR adjustments
      if (new Date(ev.date).getTime() >= yearAgo) {
        const d = toUSD(ev.delta, a.currency, rates);
        if (d >= 0) expansion += d; else contraction -= d;
      }
    });
  });
  const retARR = accounts.reduce((s, a) => s + (a.churn ? 0 : a.arrUSD), 0);
  const base = retARR + churnedARR - expansion + contraction;
  return { churnedARR, expansion, contraction,
    grr: base > 0 ? (base - churnedARR - contraction) / base : null,
    nrr: base > 0 ? (base - churnedARR - contraction + expansion) / base : null,
    lost: accounts.filter(a => a.churn && new Date(a.churn.date).getTime() >= yearAgo).length };
}

/* ---------------------------- cohort retention ---------------------------- */
const monthsBetween = (a, b) => (new Date(b).getFullYear() - new Date(a).getFullYear()) * 12 + (new Date(b).getMonth() - new Date(a).getMonth());
const quarterKey = d => { // ISO strings parsed textually (timezone-safe); Dates read in local time
  const [y, m] = typeof d === "string" ? d.split("-").map(Number) : [d.getFullYear(), d.getMonth() + 1];
  return y + "-Q" + (Math.ceil(m / 3));
};
function cohortData(accounts) {
  const now = iso(Date.now());
  const threeYrsAgo = new Date(); threeYrsAgo.setFullYear(threeYrsAgo.getFullYear() - 3);
  const rows = new Map(); // key -> { key, start (earliest startDate), accts: [] }
  accounts.forEach(a => {
    if (!a.startDate || isNaN(new Date(a.startDate))) return;
    const d = new Date(a.startDate);
    const key = d < threeYrsAgo ? String(d.getFullYear()) : `${d.getFullYear()}-Q${Math.floor(d.getMonth() / 3) + 1}`;
    if (!rows.has(key)) rows.set(key, { key, start: a.startDate, accts: [] });
    const r = rows.get(key);
    if (a.startDate < r.start) r.start = a.startDate;
    // quarters survived: Infinity if never churned
    r.accts.push({ arr: a.arrUSD || 0, surv: a.churn && a.churn.date ? Math.max(0, Math.floor(monthsBetween(a.startDate, a.churn.date) / 3)) : Infinity });
  });
  return [...rows.values()].sort((x, y) => x.start.localeCompare(y.start)).map(r => {
    const size = r.accts.length, arr = r.accts.reduce((s, x) => s + x.arr, 0);
    const maxQ = Math.floor(monthsBetween(r.start, now) / 3);
    const cells = [];
    for (let q = 0; q <= maxQ; q++) {
      const alive = r.accts.filter(x => x.surv >= q);
      cells.push({ q, pct: size ? alive.length / size : 0, arrPct: arr ? alive.reduce((s, x) => s + x.arr, 0) / arr : 0 });
    }
    return { key: r.key, size, arr, cells };
  });
}
function CohortGrid({ accounts }) {

/* ---------------------------- churn analysis ---------------------------- */
const CHURN_DIMS = ["Reason", "CSM", "Tier", "Quarterly"];
function ChurnAnalysis({ accounts, rates }) {
  const [dim, setDim] = useState("Reason");
  const rows = useMemo(() => {
    const m = new Map();
    accounts.filter(a => a.churn).forEach(a => {
      const lost = toUSD(a.churn.arr || 0, a.churn.currency || a.currency, rates);
      const k = dim === "Reason" ? (a.churn.reason || "Other")
        : dim === "CSM" ? (a.csm || "Unassigned")
        : dim === "Tier" ? (a.tier || "—")
        : quarterKey(a.churn.date);
      const r = m.get(k) || { k, n: 0, arr: 0 };
      r.n++; r.arr += lost; m.set(k, r);
    });
    if (dim !== "Quarterly") return [...m.values()].sort((x, y) => y.arr - x.arr);
    // Quarterly: last 8 quarters, chronological, zero-filled
    const keys = []; const now = new Date();
    for (let i = 7; i >= 0; i--) keys.push(quarterKey(new Date(now.getFullYear(), now.getMonth() - i * 3, 1)));
    return keys.map(k => m.get(k) || { k, n: 0, arr: 0 });
  }, [accounts, rates, dim]);
  const total = rows.reduce((s, r) => s + r.arr, 0);
  const max = Math.max(...rows.map(r => r.arr), 1);
  return (
    <Card title={`Churn analysis${total ? ` · ${fmtMoney(total)} lost` : ""}`} className="!p-3" right={
      <div className="flex items-center gap-1 text-xs">
        {CHURN_DIMS.map(d => <button key={d} onClick={() => setDim(d)}
          className={`rounded-full px-2.5 py-0.5 font-bold ${dim === d ? "bg-indigo-100 text-indigo-700" : "text-slate-500 hover:text-slate-700"}`}>{d}</button>)}
      </div>}>
      {rows.length === 0 && <div className="text-sm text-slate-500">No churn recorded. 🎉</div>}
      {rows.map(r => (
        <div key={r.k} className="flex items-center gap-3 py-1 text-sm">
          <span className="w-28 shrink-0 font-semibold text-slate-700">{r.k}</span>
          <div className="h-3 flex-1 rounded bg-slate-100">
            <div className="h-3 rounded bg-rose-400" style={{ width: `${(100 * r.arr) / max}%` }} />
          </div>
          <span className="w-24 shrink-0 text-right text-xs text-slate-600">{r.n ? `${r.n} acct${r.n > 1 ? "s" : ""}` : "—"}</span>
          <span className="w-20 shrink-0 text-right text-xs font-bold text-rose-600">{r.arr ? fmtMoney(r.arr) : "—"}</span>
        </div>
      ))}
    </Card>
  );
}

/* ----------------------- renewal outcomes by quarter ----------------------- */
function RenewalOutcomes({ accounts, rates, snapshots }) {
  const rows = useMemo(() => [4, 3, 2, 1, 0].map(off => {
    const now = new Date();
    const startMonth = Math.floor(now.getMonth() / 3) * 3 - off * 3;
    const start = new Date(now.getFullYear(), startMonth, 1);
    const end = new Date(now.getFullYear(), startMonth + 3, 1);
    const mkey = x => `${x.getFullYear()}-${String(x.getMonth() + 1).padStart(2, "0")}`;
    const startKey = mkey(start), endKey = mkey(end);
    const inQ = d => { const k = String(d).slice(0, 7); return k >= startKey && k < endKey; };
    let renewed = 0, renewedN = 0, churned = 0, churnedN = 0, slipped = 0;
    accounts.forEach(a => {
      (a.renewals || []).forEach(r => { if (r.completedOn && inQ(r.completedOn)) { renewed += toUSD(r.arr || 0, a.currency, rates); renewedN++; } });
      if (a.churn && inQ(a.churn.date)) { churned += toUSD(a.churn.arr || 0, a.churn.currency || a.currency, rates); churnedN++; }
      if (!a.churn && inQ(a.renewalDate) && daysUntil(a.renewalDate) < 0
          && !(a.renewals || []).some(r => r.completedOn && r.completedOn >= a.renewalDate)) slipped++;
    });
    const snap = (snapshots || []).find(s => s.month === startKey && s.commit90 !== undefined);
    const wr = renewed + churned > 0 ? renewed / (renewed + churned) : null;
    return { key: quarterKey(start), renewed, renewedN, churned, churnedN, slipped, wr,
      forecast: snap ? snap.commit90 : null, current: off === 0 };
  }), [accounts, rates, snapshots]);
  const firstForecast = (snapshots || []).find(s => s.commit90 !== undefined);
  const anyForecast = rows.some(r => r.forecast !== null);
  const wrChip = wr => wr === null ? <span className="text-slate-400">—</span>
    : <span className={`rounded-full px-2 py-0.5 text-xs font-bold ${wr >= 0.9 ? "bg-emerald-100 text-emerald-700" : wr >= 0.75 ? "bg-amber-100 text-amber-700" : "bg-rose-100 text-rose-600"}`}>{Math.round(100 * wr)}%</span>;
  return (
    <Card title="Renewal outcomes by quarter" className="!p-3">
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead><tr className="border-b border-slate-200 text-[11px] font-bold uppercase tracking-widest text-slate-500">
            <th className="px-2 py-1.5 text-left">Quarter</th>
            <th className="px-2 py-1.5 text-right">Renewed</th>
            <th className="px-2 py-1.5 text-right">Churned</th>
            <th className="px-2 py-1.5 text-right">Slipped</th>
            <th className="px-2 py-1.5 text-right">Win rate</th>
            {anyForecast && <th className="px-2 py-1.5 text-right">Forecast (commit)</th>}
          </tr></thead>
          <tbody>
            {rows.map(r => (
              <tr key={r.key} className="border-b border-slate-100 last:border-0">
                <td className="px-2 py-1.5 font-semibold text-slate-700">{r.key}{r.current && <span className="ml-1 text-[11px] font-normal text-slate-400">(so far)</span>}</td>
                <td className="px-2 py-1.5 text-right">{r.renewedN ? <span className="text-emerald-700">{fmtMoney(r.renewed)} <span className="text-xs text-slate-500">· {r.renewedN}</span></span> : "—"}</td>
                <td className="px-2 py-1.5 text-right">{r.churnedN ? <span className="text-rose-600">{fmtMoney(r.churned)} <span className="text-xs text-slate-500">· {r.churnedN}</span></span> : "—"}</td>
                <td className="px-2 py-1.5 text-right">{r.slipped || "—"}</td>
                <td className="px-2 py-1.5 text-right">{wrChip(r.wr)}</td>
                {anyForecast && <td className="px-2 py-1.5 text-right text-xs">{r.forecast === null ? "—"
                  : <span>{fmtMoney(r.forecast)} <span className={r.renewed >= r.forecast ? "text-emerald-600" : "text-rose-600"}>({r.renewed >= r.forecast ? "+" : "−"}{fmtMoney(Math.abs(r.renewed - r.forecast))})</span></span>}</td>}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {!anyForecast && <p className="mt-2 text-xs text-slate-500">
        Forecast tracking started {firstForecast ? new Date(firstForecast.month + "-15").toLocaleDateString("en-US", { month: "long", year: "numeric" }) : "this month"} — accuracy appears after a full quarter.</p>}
    </Card>
  );
}

/* sub-account display numbers: parentNo.1, parentNo.2, … ordered by the subs' own account # */
function subNumbers(accounts) {
  const m = new Map(), byP = new Map();
  accounts.forEach(a => { if (a.parentId) byP.set(a.parentId, [...(byP.get(a.parentId) || []), a]); });
  byP.forEach((list, pid) => {
    const p = accounts.find(x => x.id === pid); if (!p) return;
    [...list].sort((x, y) => (+x.accountNo || 0) - (+y.accountNo || 0)).forEach((s, i) => m.set(s.id, `${p.accountNo}.${i + 1}`));
  });
  return m;
}
function accountsCSVText(rows) {
  const cols = ["accountNo", "name", "tier", "arr", "currency", "arrUSD", "industry", "csm", "startDate", "renewalDate", "daysToRenewal", "score", "risk", "contractStatus", "modules", "licenses", "dedicatedSupport", "billingCompleted", "billingCompletedDate"];
  const esc = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const cell = (a, c) => c === "daysToRenewal" ? daysUntil(a.renewalDate) : c === "arrUSD" ? Math.round(a.arrUSD) : c === "dedicatedSupport" ? (a.dedicatedSupport ? "Yes" : "No") : c === "billingCompleted" ? (a.billingCompleted ? "Yes" : "No") : a[c];
  return [cols.join(","), ...rows.map(a => cols.map(c => esc(cell(a, c))).join(","))].join("\n");
}
function exportCSV(rows) {
  const url = URL.createObjectURL(new Blob([accountsCSVText(rows)], { type: "text/csv" }));
  const el = Object.assign(document.createElement("a"), { href: url, download: "accounts.csv" });
  el.click(); URL.revokeObjectURL(url);
}
function parseCSV(text) {
  const rows = []; let row = [], cur = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ",") { row.push(cur); cur = ""; }
    else if (ch === "\n" || ch === "\r") {
      if (ch === "\r" && text[i + 1] === "\n") i++;
      row.push(cur); rows.push(row); row = []; cur = "";
    } else cur += ch;
  }
  if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ""));
}
function importAccountsCSV(file, accounts, dispatch, done, user) {
  const reader = new FileReader();
  reader.onload = () => {
    const rows = parseCSV(String(reader.result));
    if (rows.length < 2) return done({ ok: 0, updated: 0, skipped: 0, err: "No data rows found — the first row must be a header (name, tier, arr, …)." });
    const norm = s => s.toLowerCase().replace(/[^a-z]/g, "");
    const header = rows[0].map(norm);
    const has = key => header.indexOf(key) >= 0;
    const col = (r, key) => { const i = header.indexOf(key); return i >= 0 ? (r[i] || "").trim() : ""; };
    if (!has("name")) return done({ ok: 0, updated: 0, skipped: 0, err: 'The header row needs a "name" column (matching Export CSV format works).' });
    // dedupe: match on accountNo first, then case-insensitive name — matched rows update the existing account
    const byNo = new Map(accounts.filter(a => a.accountNo).map(a => [String(a.accountNo), a]));
    const byName = new Map(accounts.map(a => [a.name.toLowerCase(), a]));
    let ok = 0, updated = 0, skipped = 0;
    rows.slice(1).forEach(r => {
      const name = col(r, "name");
      if (!name) { skipped++; return; }
      const num = (key, dflt) => { const v = parseFloat(col(r, key)); return isNaN(v) ? dflt : v; };
      const date = v => { const d = new Date(v); return v && !isNaN(d) ? iso(d.getTime()) : null; };
      const vals = { name };
      if (has("tier")) vals.tier = ["Enterprise", "Mid", "SMB"].find(t => t.toLowerCase() === col(r, "tier").toLowerCase()) || "Mid";
      if (has("arr")) vals.arr = Math.max(0, num("arr", 0));
      if (has("currency")) vals.currency = CURRENCIES.includes(col(r, "currency").toUpperCase()) ? col(r, "currency").toUpperCase() : "USD";
      if (has("industry")) vals.industry = col(r, "industry");
      if (has("csm")) vals.csm = col(r, "csm");
      if (has("startdate") && date(col(r, "startdate"))) vals.startDate = date(col(r, "startdate"));
      if (has("renewaldate") && date(col(r, "renewaldate"))) vals.renewalDate = date(col(r, "renewaldate"));
      if (has("contractstatus")) vals.contractStatus = ["Active", "Auto-renew", "In negotiation", "Churn risk"].find(s => s.toLowerCase() === col(r, "contractstatus").toLowerCase()) || "Active";
      if (has("modules")) vals.modules = col(r, "modules");
      if (has("licenses")) vals.licenses = Math.max(0, num("licenses", 0));
      if (has("dedicatedsupport")) vals.dedicatedSupport = ["yes", "true", "y", "1"].includes(col(r, "dedicatedsupport").toLowerCase());
      if (has("billingcompleted")) vals.billingCompleted = ["yes", "true", "y", "1"].includes(col(r, "billingcompleted").toLowerCase());
      if (has("billingcompleteddate") && date(col(r, "billingcompleteddate"))) vals.billingCompletedDate = date(col(r, "billingcompleteddate"));
      const inputPatch = clampInputs({ usage: col(r, "usage"), sentiment: col(r, "sentiment"), tickets: col(r, "tickets"), nps: col(r, "nps") });
      const no = +col(r, "accountno") || 0;
      const existing = (no && byNo.get(String(no))) || byName.get(name.toLowerCase());
      if (existing) {
        dispatch({ type: "EDIT_ACCOUNT", id: existing.id, patch: vals, by: user?.name, source: "csv import" });
        // health columns update the score too (recomputes and logs history, like ✎ Update health)
        if (Object.keys(inputPatch).length) dispatch({ type: "UPDATE_INPUTS", id: existing.id, inputs: inputPatch });
        updated++;
      } else {
        const item = { id: uid(), tier: "Mid", arr: 0, currency: "USD", industry: "", csm: "",
          startDate: iso(Date.now()), renewalDate: addDays(365), contractStatus: "Active",
          modules: "", licenses: 0, dedicatedSupport: false, ...vals, ...(no ? { accountNo: no } : {}),
          inputs: { ...DEFAULT_INPUTS, ...inputPatch },
          history: [], inputsUpdatedAt: iso(Date.now()) };
        dispatch({ type: "ADD_ACCOUNT", item });
        byName.set(name.toLowerCase(), item);
        if (no) byNo.set(String(no), item);
        ok++;
      }
    });
    done({ ok, updated, skipped });
  };
  reader.readAsText(file);
}
/* finance CSV: accountNo and/or name + billingCompletedDate — marks billing completed */
function importBillingCSV(text, accounts, dispatch) {
  const rows = parseCSV(text);
  if (rows.length < 2) return { updated: 0, skipped: 0, err: "no data rows" };
  const norm = s => s.toLowerCase().replace(/[^a-z]/g, "");
  const header = rows[0].map(norm);
  const col = (r, key) => { const i = header.indexOf(key); return i >= 0 ? (r[i] || "").trim() : ""; };
  if (header.indexOf("billingcompleteddate") < 0) return { updated: 0, skipped: 0, err: 'needs a "billingCompletedDate" column' };
  const byNo = new Map(accounts.filter(a => a.accountNo).map(a => [String(a.accountNo), a]));
  const byName = new Map(accounts.map(a => [a.name.toLowerCase(), a]));
  let updated = 0, skipped = 0;
  rows.slice(1).forEach(r => {
    const d = new Date(col(r, "billingcompleteddate"));
    const acct = (col(r, "accountno") && byNo.get(col(r, "accountno"))) || byName.get(col(r, "name").toLowerCase());
    if (!acct || isNaN(d)) { skipped++; return; }
    dispatch({ type: "EDIT_ACCOUNT", id: acct.id, patch: { billingCompleted: true, billingCompletedDate: iso(d.getTime()) } });
    updated++;
  });
  return { updated, skipped };
}

/* ---------------------- shared-drive folder sync ---------------------- */
const FS_SUPPORTED = "showDirectoryPicker" in window;
const idb = () => new Promise((res, rej) => {
  const r = indexedDB.open("crm-sync", 1);
  r.onupgradeneeded = () => r.result.createObjectStore("handles");
  r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
});
const idbSet = async (k, v) => { const db = await idb(); return new Promise((res, rej) => { const tx = db.transaction("handles", "readwrite"); tx.objectStore("handles").put(v, k); tx.oncomplete = res; tx.onerror = () => rej(tx.error); }); };
const idbGet = async k => { const db = await idb(); return new Promise((res, rej) => { const rq = db.transaction("handles").objectStore("handles").get(k); rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error); }); };
const idbDel = async k => { const db = await idb(); return new Promise((res, rej) => { const tx = db.transaction("handles", "readwrite"); tx.objectStore("handles").delete(k); tx.oncomplete = res; tx.onerror = () => rej(tx.error); }); };
async function ensurePermission(handle, mode = "read") {
  if (await handle.queryPermission({ mode }) === "granted") return true;
  return (await handle.requestPermission({ mode })) === "granted";
}
async function listCsvFiles(dirHandle) {
  const out = [];
  for await (const [name, h] of dirHandle.entries())
    if (h.kind === "file" && /\.csv$/i.test(name)) out.push(await h.getFile());
  return out;
}
function IntegrationsCard({ st, dispatch, user }) {
  const [handles, setHandles] = useState({ sales: null, finance: null });
  const [busy, setBusy] = useState(false);
  const integ = st.settings.integrations || { processed: {}, log: [] };
  useEffect(() => { (async () => {
    try { setHandles({ sales: await idbGet("sales") || null, finance: await idbGet("finance") || null }); } catch (e) {}
  })(); }, []);
  const pick = async key => {
    try { const h = await window.showDirectoryPicker({ mode: "read" }); await idbSet(key, h); setHandles(s => ({ ...s, [key]: h })); }
    catch (e) { /* user cancelled */ }
  };
  // template downloads prefilled with current data — drop into the shared-drive folder, edit, sync picks it up
  const download = (name, text) => {
    const url = URL.createObjectURL(new Blob([text], { type: "text/csv" }));
    const el = Object.assign(document.createElement("a"), { href: url, download: name });
    el.click(); URL.revokeObjectURL(url);
  };
  const salesTemplate = () => {
    const rows = st.accounts.map(a => { const score = healthScore(a, st.activities, st.settings.weights);
      return { ...a, score, risk: riskOf(score), arrUSD: toUSD(a.arr, a.currency, st.settings.rates) }; });
    download("sales-accounts.csv", accountsCSVText(rows));
  };
  const financeTemplate = () => {
    const esc = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
    download("finance-billing.csv", ["accountNo,name,billingCompletedDate",
      ...st.accounts.map(a => [a.accountNo, a.name, a.billingCompletedDate || ""].map(esc).join(","))].join("\n"));
  };
  const clear = async key => { await idbDel(key); setHandles(s => ({ ...s, [key]: null })); };
  const sync = useCallback(async () => {
    if (busy) return; setBusy(true);
    const processed = { ...integ.processed }; const log = [...integ.log];
    const note = (folder, file, msg, err) => log.push({ t: iso(Date.now()), folder, file, msg, err: !!err });
    for (const key of ["sales", "finance"]) {
      const h = handles[key]; if (!h) continue;
      try {
        if (!await ensurePermission(h)) { note(key, "—", "permission denied", true); continue; }
        for (const f of await listCsvFiles(h)) {
          const sig = `${f.name}|${f.lastModified}`;
          if (processed[sig]) continue;
          try {
            if (key === "sales") await new Promise(res => importAccountsCSV(f, st.accounts, dispatch, r =>
              { note(key, f.name, r.err || `imported ${r.ok} new · updated ${r.updated} · skipped ${r.skipped}`, !!r.err); res(); }, user));
            else { const r = importBillingCSV(await f.text(), st.accounts, dispatch);
              note(key, f.name, r.err || `billing updated ${r.updated} · skipped ${r.skipped}`, !!r.err); }
            processed[sig] = true;
          } catch (ex) { note(key, f.name, ex.message, true); }
        }
      } catch (ex) { note(key, "—", ex.message, true); }
    }
    dispatch({ type: "SET_INTEGRATIONS", integrations: { processed, log: log.slice(-20) } });
    setBusy(false);
  }, [handles, st, busy, dispatch, user]);
  useEffect(() => { // auto-scan every 5 minutes while a folder is connected
    if (!handles.sales && !handles.finance) return;
    const t = setInterval(sync, 5 * 60 * 1000);
    return () => clearInterval(t);
  }, [handles, sync]);
  if (!FS_SUPPORTED) return <Card title="Integrations — shared drive"><p className="text-sm text-slate-500">Folder sync needs Chrome or Edge (File System Access API).</p></Card>;
  return (
    <Card title="Integrations — shared drive" right={<Btn kind="primary" onClick={sync}>{busy ? "Syncing…" : "Sync now"}</Btn>}>
      {[["sales", "Sales folder", "new-account CSVs (same columns as Accounts → Import CSV)"], ["finance", "Finance folder", "billing CSVs: accountNo or name + billingCompletedDate"]].map(([key, label, hint]) => (
        <div key={key} className="mb-2 flex items-center gap-2 text-sm">
          <span className="w-28 font-semibold">{label}</span>
          {handles[key] ? <><span className="nm-inset !rounded-full px-2 py-0.5 text-xs">📁 {handles[key].name}</span>
            <button className="text-xs text-rose-500 hover:underline" onClick={() => clear(key)}>disconnect</button></>
            : <Btn onClick={() => pick(key)}>Choose folder…</Btn>}
          <span className="ml-auto text-xs text-slate-400">{hint}</span>
        </div>
      ))}
      <div className="mb-2 flex flex-wrap items-center gap-2">
        <Btn onClick={salesTemplate}>Export sales CSV</Btn>
        <Btn onClick={financeTemplate}>Export finance CSV</Btn>
        <span className="text-xs text-slate-400">prefilled with current accounts — save into the OneDrive folder, edit, sync picks it up</span>
      </div>
      <p className="mb-2 text-xs text-slate-500">Point these at folders synced from your shared drive (Google Drive / OneDrive desktop). New CSV files are imported once (re-import by re-saving the file); auto-checks every 5 min while the app is open.</p>
      {integ.log.length > 0 && <div className="max-h-32 overflow-y-auto border-t border-slate-100 pt-2 text-xs">
        {[...integ.log].reverse().map((l, i) => <div key={i} className={`py-0.5 ${l.err ? "text-rose-600" : "text-slate-600"}`}>{fmtDate(l.t)} · <b>{l.folder}</b> · {l.file}: {l.msg}</div>)}
      </div>}
    </Card>
  );
}

            })}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

/* ------------------------------- Renewals ------------------------------- */
const RENEWAL_STAGES = ["Not started", "Outreach", "Quote sent", "Negotiating", "Committed", "At risk"];
const RENEWAL_STAGE_STYLE = {
  "Not started": "bg-slate-100 text-slate-600", Outreach: "bg-sky-100 text-sky-700", "Quote sent": "bg-indigo-100 text-indigo-700",
  Negotiating: "bg-amber-100 text-amber-700", Committed: "bg-emerald-100 text-emerald-700", "At risk": "bg-rose-100 text-rose-700",
};
const renewalStageOf = a => a.renewalStage || "Not started";
function Renewals({ scored, openAccount, dispatch, allBook = [], rates = {}, snapshots = [], tasks = [], user }) {
  const months = [];
  const now = new Date(); now.setDate(1);
  for (let i = 0; i < 12; i++) {
    const m = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const key = `${m.getFullYear()}-${String(m.getMonth() + 1).padStart(2, "0")}`; // local, not toISOString — UTC shifts the month
    months.push({ key, label: m.toLocaleDateString("en-US", { month: "short", year: "numeric" }), items: scored.filter(a => a.renewalDate.slice(0, 7) === key) });
  }
  // 90-day forecast by renewal stage (USD)
  const due90 = scored.filter(a => { const d = daysUntil(a.renewalDate); return d >= 0 && d <= 90; });
  const sum = list => list.reduce((s, a) => s + a.arrUSD, 0);
  const commit = sum(due90.filter(a => renewalStageOf(a) === "Committed"));
  const atRisk = sum(due90.filter(a => renewalStageOf(a) === "At risk"));
  const best = sum(due90) - atRisk;
  const notStarted = due90.filter(a => renewalStageOf(a) === "Not started");
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-4 gap-3">
        <Stat label="Due next 90d" value={fmtMoney(sum(due90))} sub={`${due90.length} renewal(s)`} />
        <Stat label="Commit (90d)" value={fmtMoney(commit)} tone="text-emerald-600" sub="stage: Committed" />
        <Stat label="Best case (90d)" value={fmtMoney(best)} sub="everything except At risk" />
        <Stat label="At risk (90d)" value={fmtMoney(atRisk)} tone={atRisk ? "text-rose-600" : undefined} sub={`${notStarted.length} not started yet`} />
      </div>
      <div className="flex gap-3 overflow-x-auto pb-3">
      {months.map(m => (
        <div key={m.key} className="nm w-56 shrink-0 p-4">
          <div className="mb-2 flex justify-between text-xs font-semibold text-slate-700">
            <span>{m.label}</span><span>{m.items.length ? fmtMoney(m.items.reduce((s, a) => s + a.arrUSD, 0)) + " USD" : ""}</span>
          </div>
          {m.items.length === 0 && <div className="text-xs italic text-slate-400">—</div>}
          {m.items.map(a => (
            <div key={a.id} onClick={() => openAccount(a.id)} className="nm-sm mb-3 w-full cursor-pointer p-2.5 text-left hover:bg-slate-50">
              <div className="flex items-center justify-between text-sm font-medium">{a.name}<HealthChip score={a.score} /></div>
              <div className="mt-0.5 text-xs text-slate-700">{fmtMoney(a.arr, a.currency)} · {a.contractStatus} · {daysUntil(a.renewalDate)}d</div>
              <select value={renewalStageOf(a)} onClick={e => e.stopPropagation()}
                onChange={e => dispatch({ type: "EDIT_ACCOUNT", id: a.id, patch: { renewalStage: e.target.value }, by: user?.name, source: "inline" })}
                className={`mt-1.5 w-full cursor-pointer rounded border-0 px-1.5 py-0.5 text-xs font-semibold outline-none ${RENEWAL_STAGE_STYLE[renewalStageOf(a)]}`}>
                {RENEWAL_STAGES.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
              {(() => {
                const pt = tasks.filter(t => t.accountId === a.id && t.playbook && t.renewalFor === a.renewalDate);
                if (!pt.length) return null;
                const done = pt.filter(t => t.status === "Done").length;
                const behind = pt.some(t => t.status !== "Done" && t.due < iso(Date.now())); // textual ISO compare
                return <span title={behind ? "Playbook behind pace — an open step is past due" : "Playbook on pace"}
                  className={`mt-1.5 inline-block rounded-full px-2 py-0.5 text-[11px] font-bold ${behind ? "bg-amber-100 text-amber-700" : "bg-emerald-100 text-emerald-700"}`}>{done}/{pt.length} ✓</span>;
              })()}
            </div>
          ))}
        </div>
      ))}
      </div>
      <RenewalOutcomes accounts={allBook} rates={rates} snapshots={snapshots} />
    </div>
  );
}

function UsersCard({ me }) {

  const load = () => sb.from("profiles").select("id,name,role,created_at").order("created_at").then(({ data, error }) => error ? setErr(error.message) : setUsers(data || []));
  useEffect(() => { load(); }, []);
  const setRole = async (u, role) => {
    setErr(""); setMsg("");
    const { error } = await sb.from("profiles").update({ role }).eq("id", u.id);
    if (error) setErr(error.message); else load();
  };
  const [editing, setEditing] = useState(null); // {id, name}
  const renameEverywhere = async (oldName, newName) => {
    // keep account CSM assignments and task owners in sync with the new name
    for (const [t, key] of [["accounts", "csm"], ["tasks", "owner"]]) {
      const { data } = await sb.from(t).select("id,data");
      for (const row of data || []) {
        if (row.data && row.data[key] === oldName) {
          row.data[key] = newName;
          const { error } = await sb.from(t).upsert({ id: row.id, data: row.data });
          if (error) throw error;
        }
      }
    }
  };
  const saveRename = async u => {
    const newName = editing.name.trim();
    setErr(""); setMsg("");
    if (!newName) return setErr("Name cannot be empty.");
    if (newName === u.name) return setEditing(null);
    if (users.some(x => x.id !== u.id && x.name === newName)) return setErr("That name is already taken.");
    setBusy(true);
    try {
      const { error } = await sb.from("profiles").update({ name: newName }).eq("id", u.id);
      if (error) throw error;
      await renameEverywhere(u.name, newName);
      setMsg(`Renamed ${u.name} → ${newName}; their accounts and tasks were updated too.`);
      setEditing(null); load();
    } catch (ex) { setErr(ex.message); }
    setBusy(false);
  };
  const addUser = async e => {
    e.preventDefault(); setErr(""); setMsg("");
    if (!v.name.trim() || !v.email.trim()) return setErr("Name and email are required.");
    if (v.pass.length < 6) return setErr("Temporary password must be at least 6 characters.");
    setBusy(true);
    try {
      // separate throwaway client so creating the user does NOT switch our own session
      const tmp = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false, autoRefreshToken: false } });
      const { data, error } = await tmp.auth.signUp({ email: v.email.trim(), password: v.pass, options: { data: { name: v.name.trim() } } });
      if (error) throw error;
      if (v.role === "admin" && data.user) {
        const { error: e2 } = await sb.from("profiles").update({ role: "admin" }).eq("id", data.user.id);
        if (e2) throw e2;
      }
      setMsg(`${v.name.trim()} added as ${v.role}. Share the email + temporary password with them (they can change it via "Forgot password?"). If email confirmation is enabled in Supabase, they must click the confirmation link first.`);
      setV({ name: "", email: "", pass: "", role: "user" });
      load();
    } catch (ex) { setErr(ex.message); }
    setBusy(false);
  };
  return (
    <Card title={`Users (${users.length})`}>
      {users.map(u => (
        <div key={u.id} className="flex items-center gap-2 border-b border-slate-100 py-1.5 text-sm last:border-0">
          {editing && editing.id === u.id ? (
            <span className="flex flex-1 items-center gap-2">
              <Input autoFocus value={editing.name} onChange={e => setEditing({ ...editing, name: e.target.value })}
                onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); saveRename(u); } if (e.key === "Escape") setEditing(null); }} className="w-44 !py-0.5" />
              <button className="text-xs font-bold text-indigo-600 hover:underline" onClick={() => saveRename(u)}>{busy ? "…" : "save"}</button>
              <button className="text-xs text-slate-500 hover:underline" onClick={() => setEditing(null)}>cancel</button>
            </span>
          ) : (
            <span className="flex-1">{u.name}{u.id === me.id && <span className="text-xs text-slate-500"> (you)</span>}
              <button title="Rename user" className="ml-2 text-xs text-indigo-500 hover:text-indigo-700" onClick={() => { setErr(""); setMsg(""); setEditing({ id: u.id, name: u.name }); }}>✎</button>
            </span>
          )}
          <span className={`rounded px-1.5 py-0.5 text-xs font-semibold ${u.role === "admin" ? "bg-indigo-50 text-indigo-600" : "bg-slate-100 text-slate-700"}`}>{u.role}</span>
          {u.id !== me.id && (u.role === "user"
            ? <button className="text-xs text-indigo-600 hover:underline" onClick={() => setRole(u, "admin")}>make admin</button>
            : <button className="text-xs text-rose-500 hover:underline" onClick={() => setRole(u, "user")}>demote</button>)}
        </div>
      ))}
      <form onSubmit={addUser} className="mt-3 flex flex-wrap items-center gap-2">
        <Input placeholder="Name" value={v.name} onChange={e => setV({ ...v, name: e.target.value })} className="w-32" />
        <Input placeholder="Email" type="email" value={v.email} onChange={e => setV({ ...v, email: e.target.value })} className="w-52" />
        <Input placeholder="Temp password" type="text" value={v.pass} onChange={e => setV({ ...v, pass: e.target.value })} className="w-36" />
        <Select value={v.role} onChange={e => setV({ ...v, role: e.target.value })} options={["user", "admin"]} />
        <Btn kind="primary" type="submit">{busy ? "Adding…" : "Add user"}</Btn>
      </form>
      {err && <div className="mt-2 rounded bg-rose-50 px-2 py-1 text-xs text-rose-600">{err}</div>}
      {msg && <div className="mt-2 rounded bg-emerald-50 px-2 py-1 text-xs text-emerald-700">{msg}</div>}
      <p className="mt-2 text-xs text-slate-500">Add any number of users or admins — this is the only way to get a login (self-sign-up is disabled). At least one admin always remains (enforced by the database). To remove someone entirely: Supabase dashboard → Authentication → Users.</p>
    </Card>
  );
}

/* --------------------------- command palette --------------------------- */
/* case-insensitive subsequence match: "nrw" matches "Northwind" */
function subseqMatch(q, text) {
  q = q.toLowerCase(); text = text.toLowerCase();
  if (!q) return true;
  let i = 0;
  for (const ch of text) { if (ch === q[i]) i++; if (i === q.length) return true; }
  return false;
}
const PALETTE_ACTIONS = [
  { key: "activity", label: "Log activity" }, { key: "task", label: "Add task" },
  { key: "renewal", label: "Complete renewal" }, { key: "health", label: "Update health" },
  { key: "edit", label: "Edit account" },
];
function CommandPalette({ open, onClose, accounts, user, go }) {
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(0);
  useEffect(() => { if (open) { setQ(""); setSel(0); } }, [open]);
  if (!open) return null;
  const views = (user.role === "admin" ? VIEWS : VIEWS.filter(v => v !== "Settings"))
    .filter(v => subseqMatch(q, "go to " + v))
    .map(v => ({ type: "view", id: "v-" + v, label: `Go to ${v}`, run: () => go(v) }));
  const prefix = t => t.toLowerCase().startsWith(q.toLowerCase());
  const accts = accounts.filter(a => subseqMatch(q, a.name))
    .sort((a, b) => (prefix(b.name) - prefix(a.name)) || a.name.localeCompare(b.name))
    .map(a => ({ type: "account", id: a.id, label: a.name + (a.churn ? " · churned" : ""), acct: a, run: () => go("Accounts", a.id) }));
  const rows = (q ? [...accts, ...views] : [...views, ...accts]).slice(0, 12);
  // contextual actions expand under the top account match (only when it leads the list)
  const list = [];
  rows.forEach((r, idx) => {
    list.push(r);
    if (idx === 0 && r.type === "account") {
      PALETTE_ACTIONS.filter(x => !(r.acct.churn && x.key === "renewal")).forEach(x =>
        list.push({ type: "action", id: r.id + "-" + x.key, label: "↳ " + x.label, run: () => go("Accounts", r.acct.id, x.key) }));
    }
  });
  const cur = Math.min(sel, Math.max(list.length - 1, 0));
  const onKey = e => {
    if (e.key === "Escape") { e.stopPropagation(); onClose(); }
    else if (e.key === "ArrowDown") { e.preventDefault(); if (!list.length) return; setSel((cur + 1) % list.length); }
    else if (e.key === "ArrowUp") { e.preventDefault(); if (!list.length) return; setSel((cur - 1 + list.length) % list.length); }
    else if (e.key === "Enter" && list.length) { e.preventDefault(); list[cur].run(); onClose(); }
  };
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center bg-slate-900/40 pt-[15vh]" onClick={onClose}>
      <div className="nm w-full max-w-lg p-3" onClick={e => e.stopPropagation()}>
        <Input autoFocus placeholder="Type a view or account…" value={q}
          onChange={e => { setQ(e.target.value); setSel(0); }} onKeyDown={onKey} className="w-full" />
        <div className="mt-2 max-h-80 overflow-y-auto">
          {list.length === 0 && <div className="px-2 py-1.5 text-sm text-slate-500">No results</div>}
          {list.map((it, i) => (
            <div key={it.id} onClick={() => { it.run(); onClose(); }} onMouseEnter={() => setSel(i)}
              className={`cursor-pointer rounded px-2 py-1.5 text-sm ${it.type === "action" ? "pl-6 " : ""}${i === cur ? "bg-indigo-100 text-indigo-800" : "text-slate-800"}`}>
              {it.label}
            </div>
          ))}
        </div>
        <div className="mt-2 px-2 text-[11px] text-slate-500">↑↓ navigate · Enter select · Esc close</div>
      </div>
    </div>
  );
}
const VIEWS = ["Dashboard", "Accounts", "Renewals", "Settings"];
function App({ user }) {
  const views = user.role === "admin" ? VIEWS : VIEWS.filter(v => v !== "Settings");
  const [st, setSt] = useState(emptyData);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("Dashboard");
  const [acctId, setAcctId] = useState(null);
  const [acctFilter, setAcctFilter] = useState(null); // {risk, showChurned} applied to AccountList on dashboard card click
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [pendingForm, setPendingForm] = useState(null); // form to auto-open on next AccountDetail mount (from palette)
  const openAccounts = filter => { setView("Accounts"); setAcctId(null); setAcctFilter({ ...(filter || {}), t: Date.now() }); };
  const searchRef = useRef();
  const dispatch = useCallback(action => setSt(prev => {
    const next = reducer(prev, action);
    if (action.type !== "REPLACE") persist(action, next);
    return next;
  }), []);
  const refetch = useCallback(() => fetchAll()
    .then(s => { setSt(s); setLoaded(true); })
    .catch(e => { console.error(e); alert("Could not load shared data: " + e.message); }), []);
  useEffect(() => { refetch(); }, [refetch]);
  useEffect(() => { // live updates from teammates: debounce, then refetch everything (data is small)
    let timer = null;
    const ch = sb.channel("crm-live").on("postgres_changes", { event: "*", schema: "public" },
      () => { clearTimeout(timer); timer = setTimeout(refetch, 800); }).subscribe();
    return () => { clearTimeout(timer); sb.removeChannel(ch); };
  }, [refetch]);
  useEffect(() => {
    const h = e => {
      if (paletteOpen) return; // palette modal owns the keyboard while open
      if (["INPUT", "SELECT", "TEXTAREA"].includes(e.target.tagName)) return;
      if (e.key === "/") { e.preventDefault(); setView("Accounts"); setAcctId(null); setTimeout(() => searchRef.current?.focus(), 50); }
      const i = "12345".indexOf(e.key);
      if (i >= 0 && i < views.length) { setView(views[i]); setAcctId(null); }
      if (e.key === "Escape") setAcctId(null);
    };
    window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
  }, [paletteOpen]);
  useEffect(() => { // Ctrl/Cmd+K toggles the command palette from anywhere, incl. inputs
    const h = e => { if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && e.key.toLowerCase() === "k") { e.preventDefault(); setPaletteOpen(o => !o); } };
    window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
  }, []);
  const scored = useMemo(() => st.accounts.map(a => {
    const score = healthScore(a, st.activities, st.settings.weights);
    return { ...a, score, risk: riskOf(score), flags: flagsFor(a, st.activities, score), arrUSD: toUSD(a.arr, a.currency, st.settings.rates) };
  }), [st]);
  useEffect(() => { // one aggregate snapshot per calendar month (whole book) for trend lines
    if (!loaded || !scored.length) return;
    const month = iso(Date.now()).slice(0, 7);
    const snaps = st.settings.snapshots || [];
    // re-take this month's snapshot once if it predates forecast recording
    if (snaps.some(s => s.month === month && s.commit90 !== undefined)) return;
    const act = scored.filter(a => !a.churn);
    const r = retentionStats(scored, st.settings.rates);
    const counts = { Green: 0, Yellow: 0, Red: 0 };
    act.forEach(a => counts[a.risk]++);
    const due90 = act.filter(a => { const d = daysUntil(a.renewalDate); return d >= 0 && d <= 90; });
    const s90 = list => Math.round(list.reduce((s, a) => s + a.arrUSD, 0));
    dispatch({ type: "SET_SNAPSHOTS", snapshots: [...snaps.filter(s => s.month !== month),
      { month, totalARR: Math.round(act.reduce((s, a) => s + a.arrUSD, 0)), accounts: act.length,
        nrr: r.nrr, grr: r.grr, churnedARR: Math.round(r.churnedARR), ...counts,
        due90: s90(due90), commit90: s90(due90.filter(a => renewalStageOf(a) === "Committed")),
        atRisk90: s90(due90.filter(a => renewalStageOf(a) === "At risk")), due90Count: due90.length }].slice(-24) });
  }, [loaded, scored]);
  useEffect(() => { // auto-create renewal playbook tasks when an account is within 90d of renewal
    if (!loaded) return;
    const pb = playbookOf(st.settings);
    if (!pb.length) return;
    st.accounts.forEach(a => {
      // no lower bound on daysUntil: accounts already past renewal still seed (spec: include overdue)
      if (a.churn || daysUntil(a.renewalDate) > 90 || a.playbookSeededFor === a.renewalDate) return;
      const items = pb.filter(p => p.title.trim()).map(p => ({
        id: `pb-${a.id}-${a.renewalDate}-${p.id}`, accountId: a.id, playbook: true, renewalFor: a.renewalDate,
        title: "▶ " + p.title, due: isoMinus(a.renewalDate, p.offsetDays),
        priority: p.priority, status: "Open", owner: a.csm || "" }));
      if (items.length) dispatch({ type: "SEED_PLAYBOOK", id: a.id, seededFor: a.renewalDate, items });
    });
  }, [loaded, st.accounts, st.settings.playbook]);
  const [scopeSel, setScopeSel] = useState(null);
  const [collapsed, setCollapsed] = useState(() => { try { return localStorage.getItem("crm-nav") === "1"; } catch (e) { return false; } });
  useEffect(() => { try { localStorage.setItem("crm-nav", collapsed ? "1" : "0"); } catch (e) {} }, [collapsed]);
  const myCount = scored.filter(a => a.csm === user.name).length;
  const scope = scopeSel ?? (user.role === "admin" ? "all" : myCount > 0 ? "mine" : "all"); // admins default to the whole book
  const visible = scope === "mine" ? scored.filter(a => a.csm === user.name) : scored; // includes churned
  const active = visible.filter(a => !a.churn);
  const openAccount = (id, form) => { setView("Accounts"); setAcctId(id); if (form) setPendingForm(form); };
  const [notifOpen, setNotifOpen] = useState(false);
  const renewalsDue = active
    .filter(a => { const d = daysUntil(a.renewalDate); return d >= 0 && d <= 30; })
    .sort((x, y) => daysUntil(x.renewalDate) - daysUntil(y.renewalDate));
  return (
    <div className="flex min-h-screen">
      <aside className={`fixed inset-y-0 left-0 z-30 flex flex-col border-r border-slate-200 bg-white transition-all ${collapsed ? "w-14" : "w-52"}`}>
        <div className={`flex items-center pb-4 pt-5 ${collapsed ? "justify-center px-0" : "justify-between px-5"}`}>
          {!collapsed && <span className="text-lg font-extrabold tracking-tight text-slate-900">One<span className="text-indigo-600">Vio</span></span>}
          <button title={collapsed ? "Expand sidebar" : "Collapse sidebar"} onClick={() => setCollapsed(c => !c)}
            className="rounded-md p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-700">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              {collapsed ? <polyline points="9 18 15 12 9 6" /> : <polyline points="15 18 9 12 15 6" />}
            </svg>
          </button>
        </div>
        <nav className={`flex-1 space-y-0.5 ${collapsed ? "px-2" : "px-3"}`}>
          {views.map(v => (
            <button key={v} title={v} onClick={() => { setView(v); setAcctId(null); }}
              className={`flex w-full items-center rounded-lg py-2 text-sm font-medium ${collapsed ? "justify-center px-0" : "gap-2.5 px-3"} ${view === v ? "bg-indigo-50 font-semibold text-indigo-700" : "text-slate-600 hover:bg-slate-100 hover:text-slate-900"}`}>
              {NAV_ICONS[v]}{!collapsed && <span className="flex-1 text-left">{v}</span>}
            </button>
          ))}
        </nav>
        <div className={`border-t border-slate-200 ${collapsed ? "p-2" : "p-4"}`}>
          {!collapsed && <>
            <div className="truncate text-sm font-semibold text-slate-900">{user.name}</div>
            <div className="text-xs text-slate-500">{user.role}{loaded ? "" : " · loading…"}</div>
          </>}
          <button title={`Sign out (${user.name})`} className={`nm-btn text-xs font-semibold text-slate-600 ${collapsed ? "flex h-9 w-9 items-center justify-center" : "mt-3 w-full px-3 py-1.5"}`}
            onClick={() => sb.auth.signOut()}>{collapsed ? "⎋" : "Sign out"}</button>
        </div>
      </aside>
      <main className={`${collapsed ? "ml-14" : "ml-52"} min-w-0 flex-1 px-6 py-5 transition-all`}>
      <div className="mb-5 flex items-center gap-3">
        <h1 className="text-xl font-bold tracking-tight text-slate-900">{view === "Accounts" && acctId ? "Account detail" : view}</h1>
        <div className="nm-inset ml-3 flex items-center gap-0.5 !rounded-lg p-0.5">
          {[["mine", `My book${myCount ? ` (${myCount})` : ""}`], ["all", "All"]].map(([k, label]) => (
            <button key={k} onClick={() => setScopeSel(k)}
              className={`rounded-md px-3 py-1 text-xs font-semibold ${scope === k ? "bg-indigo-600 text-white shadow-sm" : "text-slate-600 hover:text-slate-900"}`}>{label}</button>
          ))}
        </div>
        <div className="relative ml-1">
          <button onClick={() => setNotifOpen(o => !o)} title="Renewals due within 30 days"
            className="nm-btn relative flex h-9 w-9 items-center justify-center text-base">🔔
            {renewalsDue.length > 0 && <span className="absolute -right-0.5 -top-0.5 flex h-4 min-w-[16px] items-center justify-center rounded-full bg-rose-500 px-1 text-[11px] font-bold text-white">{renewalsDue.length}</span>}
          </button>
          {notifOpen && (
            <div className="nm absolute right-0 z-20 mt-2 w-80 p-3">
              <div className="px-2 py-1 text-xs font-semibold text-slate-700">Renewals due within 30 days</div>
              {renewalsDue.length === 0 && <div className="px-2 py-2 text-sm text-slate-500">Nothing due in the next 30 days. 🎉</div>}
              {renewalsDue.map(a => (
                <button key={a.id} onClick={() => { setNotifOpen(false); openAccount(a.id); }}
                  className="flex w-full items-center justify-between rounded px-2 py-1.5 text-left text-sm hover:bg-slate-50">
                  <span className="font-medium">{a.name}</span>
                  <span className="flex items-center gap-2 text-xs">
                    <span className="text-slate-700">{fmtDate(a.renewalDate)}</span>
                    <span className={`rounded px-1.5 py-0.5 font-semibold ${daysUntil(a.renewalDate) <= 7 ? "bg-rose-100 text-rose-700" : "bg-amber-100 text-amber-700"}`}>{daysUntil(a.renewalDate)}d</span>
                  </span>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
      {view === "Dashboard" && <Dashboard st={st} scored={active} all={visible} allAccounts={scored} scope={scope} setScopeSel={setScopeSel} myCount={myCount} renewalsDue={renewalsDue} user={user} dispatch={dispatch} openAccount={openAccount} openAccounts={openAccounts} />}
      {view === "Accounts" && (acctId
        ? <AccountDetail st={st} scored={scored} id={acctId} dispatch={dispatch} back={() => setAcctId(null)} user={user} team={st.team} openAccount={openAccount} initialForm={pendingForm} clearInitialForm={() => setPendingForm(null)} />
        : <AccountList scored={visible} allAccounts={st.accounts} openAccount={openAccount} searchRef={searchRef} dispatch={dispatch} team={st.team} initialFilter={acctFilter} user={user} />)}
      {view === "Renewals" && <Renewals scored={active} openAccount={openAccount} dispatch={dispatch} allBook={scored} rates={st.settings.rates} snapshots={st.settings.snapshots || []} tasks={st.tasks} user={user} />}
      {view === "Settings" && user.role === "admin" && <Settings st={st} dispatch={dispatch} user={user} />}

        go={(v, id, form) => { if (id) openAccount(id, form); else { setView(v); setAcctId(null); } }} />
      <Copyright />
      </main>
    </div>
  );
}
function Root() {
  const [ready, setReady] = useState(false);
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  useEffect(() => {
    if (!CONFIGURED) return;
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setReady(true); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);
  useEffect(() => {
    if (!session) { setProfile(null); return; }
    sb.from("profiles").select("id,name,role").eq("id", session.user.id).single()
      .then(({ data, error }) => error ? alert("Could not load your profile: " + error.message) : setProfile(data));
  }, [session]);
  if (!CONFIGURED) return <SetupScreen />;
  if (!ready) return <div className="flex min-h-screen items-center justify-center text-sm text-slate-500">Loading…</div>;
  if (!session) return <AuthScreen />;
  if (!profile) return <div className="flex min-h-screen items-center justify-center text-sm text-slate-500">Loading profile…</div>;

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
