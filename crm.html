 * HEALTH SCORE LOGIC
 * ----------------------------------------------------------------------------
 * score = w.usage*usage + w.sentiment*sentiment + w.tickets*ticketScore
 *       + w.recency*recencyScore + w.nps*npsNorm          (weights sum to 1)
 *
 *   usage, sentiment : stored per-account, 0..100
 *   ticketScore      : 100 - min(openTickets*10, 100)
 *   recencyScore     : 100 if last activity <=7 days ago, linear to 0 at 60d
 *   npsNorm          : (nps + 100) / 2   (NPS -100..100 -> 0..100)
 *
 * Risk: score >=70 Green | 40..69 Yellow | <40 Red
 *
 * TO EXTEND: add a key to DEFAULT_WEIGHTS + a component fn in scoreComponents()
 * — the weight sliders, formula display, and normalization pick it up

const DAY = 86400000;
const today = () => new Date();
const iso = d => new Date(d).toISOString().slice(0, 10);
const addDays = n => iso(Date.now() + n * DAY);
const daysUntil = d => Math.ceil((new Date(d) - Date.now()) / DAY);
const daysSince = d => Math.floor((Date.now() - new Date(d)) / DAY);

function lastActivityDate(accountId, activities) {
  const a = activities.filter(x => x.accountId === accountId).sort((x, y) => y.date.localeCompare(x.date));
  return a.length ? a[0].date : null;
}
function scoreComponents(acct, activities) {
  const la = lastActivityDate(acct.id, activities);
  const ds = la ? daysSince(la) : 999;
  return {
    usage: acct.inputs.usage,
    sentiment: acct.inputs.sentiment,
    tickets: 100 - Math.min(acct.inputs.tickets * 10, 100),
    recency: ds <= 7 ? 100 : ds >= 60 ? 0 : Math.round(100 * (1 - (ds - 7) / 53)),
    nps: Math.round((acct.inputs.nps + 100) / 2),
  };
}
function healthScore(acct, activities, weights) {
  const c = scoreComponents(acct, activities);
  const tw = Object.values(weights).reduce((a, b) => a + b, 0) || 1;
  return Math.round(Object.keys(weights).reduce((s, k) => s + (weights[k] / tw) * (c[k] ?? 0), 0));
}
const riskOf = s => (s >= 70 ? "Green" : s >= 40 ? "Yellow" : "Red");
const RISK_STYLE = {

};
const RISK_HEX = { Green: "#10b981", Yellow: "#f59e0b", Red: "#f43f5e" };

function flagsFor(acct, activities, score) {
  if (acct.churn) return [];
  const f = [];
  const la = lastActivityDate(acct.id, activities);
  if ((!la || daysSince(la) >= 30) && daysSince(acct.startDate) >= 30) f.push("No activity 30d+");
  const dr = daysUntil(acct.renewalDate);
  if (dr >= 0 && dr < 60) f.push(`Renewal in ${dr}d`);
  const old = acct.history.filter(h => daysSince(h.d) >= 25);
  if (old.length && old[old.length - 1].s - score >= 10) f.push(`Health ↓${old[old.length - 1].s - score}`);
  const iu = daysSince(acct.inputsUpdatedAt || acct.startDate);
  if (iu >= 45) f.push(`Inputs stale ${iu}d`);
  return f;
}

/* ------------------------------ store (Supabase) ------------------------------ */
const ENTITY_TABLES = ["accounts", "contacts", "activities", "tasks", "opportunities"];
const dbError = (where, error) => { console.error(where, error); alert(`Save failed (${where}): ${error.message}\nYour last change may not be shared — reload to resync.`); };

async function fetchAll() {
  const res = await Promise.all([
    ...ENTITY_TABLES.map(t => sb.from(t).select("data")),
    sb.from("settings").select("data").eq("id", 1),
    sb.from("profiles").select("id,name,role"),
  ]);
  const bad = res.find(r => r.error);
  if (bad) throw bad.error;
  const [ac, co, act, ta, op, se] = res.slice(0, 6).map(r => r.data.map(x => x.data));
  ac.forEach(a => { if (!a.currency) a.currency = "USD"; });
  const saved = (se && se[0]) || {};
  return {
    accounts: ac, contacts: co, activities: act, tasks: ta, opportunities: op,
    team: res[6].data || [],
    settings: { weights: { ...DEFAULT_WEIGHTS, ...(saved.weights || {}) }, rates: { ...DEFAULT_RATES, ...(saved.rates || {}) } },
  };
}

/* write-through: mirror a just-reduced action into Supabase */
function persist(action, next) {
  const up = (t, item) => sb.from(t).upsert({ id: item.id, data: item, updated_at: new Date().toISOString() }).then(({ error }) => error && dbError(t, error));
  switch (action.type) {
    case "ADD_ACCOUNT": return up("accounts", action.item);
    case "ADD_CONTACT": return up("contacts", action.item);
    case "ADD_OPP": return up("opportunities", action.item);
    case "ADD_ACTIVITY": return up("activities", action.item);
    case "ADD_TASK": return up("tasks", action.item);
    case "TOGGLE_TASK": case "EDIT_TASK": { const t = next.tasks.find(x => x.id === action.id); return t && up("tasks", t); }
    case "EDIT_ACTIVITY": { const x = next.activities.find(v => v.id === action.id); return x && up("activities", x); }
    case "UPDATE_INPUTS": case "EDIT_ACCOUNT": case "COMPLETE_RENEWAL": case "CHURN_ACCOUNT": case "REACTIVATE_ACCOUNT": case "ADJUST_ARR": { const a = next.accounts.find(x => x.id === action.id); return a && up("accounts", a); }
    case "SET_OPP_STAGE": { const o = next.opportunities.find(x => x.id === action.id); return o && up("opportunities", o); }
    case "DELETE_ACCOUNT":
      sb.from("accounts").delete().eq("id", action.id).then(({ error }) => error && dbError("accounts", error));
      ["contacts", "activities", "tasks", "opportunities"].forEach(t =>
        sb.from(t).delete().eq("data->>accountId", action.id).then(({ error }) => error && dbError(t, error)));
      return;
    case "SET_WEIGHTS": case "SET_RATES":
      return sb.from("settings").upsert({ id: 1, data: next.settings, updated_at: new Date().toISOString() }).then(({ error }) => error && dbError("settings", error));
  }
}

/* bulk replace (sample data / clear / JSON import) — admin only, RLS enforced */
async function replaceAllRemote(state) {
  for (const t of ENTITY_TABLES) {
    const { error } = await sb.from(t).delete().neq("id", "");
    if (error) throw error;
  }
  const key = { accounts: "accounts", contacts: "contacts", activities: "activities", tasks: "tasks", opportunities: "opportunities" };
  for (const t of ENTITY_TABLES) {
    const rows = state[key[t]].map(item => ({ id: item.id, data: item }));
    if (rows.length) { const { error } = await sb.from(t).insert(rows); if (error) throw error; }
  }
  const { error } = await sb.from("settings").upsert({ id: 1, data: state.settings });
  if (error) throw error;
}
function reducer(state, action) {
  switch (action.type) {
    case "REPLACE": return action.state;
    case "ADD_ACCOUNT": return { ...state, accounts: [...state.accounts, action.item] };
    case "EDIT_ACCOUNT": return { ...state, accounts: state.accounts.map(a => a.id === action.id ? { ...a, ...action.patch } : a) };
    case "COMPLETE_RENEWAL": return { ...state, accounts: state.accounts.map(a => a.id === action.id
      ? { ...a, renewalDate: action.newDate, arr: action.newArr, contractStatus: "Active", renewals: [...(a.renewals || []), action.entry] }
      : a) };
    case "CHURN_ACCOUNT": return { ...state, accounts: state.accounts.map(a => a.id === action.id
      ? { ...a, contractStatus: "Churned", churn: action.entry } : a) };
    case "REACTIVATE_ACCOUNT": return { ...state, accounts: state.accounts.map(a => a.id === action.id
      ? { ...a, contractStatus: "Active", churn: null } : a) };
    case "ADJUST_ARR": return { ...state, accounts: state.accounts.map(a => a.id === action.id
      ? { ...a, arr: action.newArr, arrEvents: [...(a.arrEvents || []), action.entry] } : a) };
    case "SET_OPP_STAGE": return { ...state, opportunities: state.opportunities.map(o => o.id === action.id ? { ...o, stage: action.stage } : o) };
    case "DELETE_ACCOUNT": return { ...state,
      accounts: state.accounts.filter(a => a.id !== action.id),
      contacts: state.contacts.filter(c => c.accountId !== action.id),
      activities: state.activities.filter(x => x.accountId !== action.id),
      tasks: state.tasks.filter(t => t.accountId !== action.id),
      opportunities: state.opportunities.filter(o => o.accountId !== action.id) };
    case "ADD_CONTACT": return { ...state, contacts: [...state.contacts, action.item] };
    case "ADD_OPP": return { ...state, opportunities: [...state.opportunities, action.item] };
    case "ADD_ACTIVITY": return { ...state, activities: [...state.activities, action.item] };
    case "EDIT_ACTIVITY": return { ...state, activities: state.activities.map(x => x.id === action.id ? { ...x, ...action.patch } : x) };
    case "ADD_TASK": return { ...state, tasks: [...state.tasks, action.item] };
    case "EDIT_TASK": return { ...state, tasks: state.tasks.map(t => t.id === action.id ? { ...t, ...action.patch } : t) };
    case "TOGGLE_TASK": return { ...state, tasks: state.tasks.map(t => t.id === action.id ? { ...t, status: t.status === "Done" ? "Open" : "Done" } : t) };
    case "UPDATE_INPUTS": {
      return { ...state, accounts: state.accounts.map(a => {
        if (a.id !== action.id) return a;
        const upd = { ...a, inputs: { ...a.inputs, ...action.inputs }, inputsUpdatedAt: iso(Date.now()) };
        const s = healthScore(upd, state.activities, state.settings.weights);
        return { ...upd, history: [...a.history, { d: iso(Date.now()), s }] };
      }) };
    }
    case "SET_WEIGHTS": return { ...state, settings: { ...state.settings, weights: action.weights } };
    case "SET_RATES": return { ...state, settings: { ...state.settings, rates: action.rates } };
    default: return state;
  }
}

/* ----------------------------- tiny charts ----------------------------- */
function Sparkline({ points, w = 220, h = 48 }) {
  if (!points.length) return null;
  const vals = points.map(p => p.s);
  const min = Math.min(...vals, 0), max = Math.max(...vals, 100);
  const xy = points.map((p, i) => [8 + (i * (w - 16)) / Math.max(points.length - 1, 1), h - 6 - ((p.s - min) / (max - min || 1)) * (h - 12)]);
  const d = xy.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const last = points[points.length - 1].s;
  return (
    <svg width={w} height={h}>
      <path d={d} fill="none" stroke={RISK_HEX[riskOf(last)]} strokeWidth="2" />
      {xy.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill={RISK_HEX[riskOf(points[i].s)]} />)}
    </svg>
  );
}
function DistBar({ counts }) {
  const total = counts.Green + counts.Yellow + counts.Red || 1;
  return (
    <div>
      <div className="flex h-4 w-full overflow-hidden rounded">
        {["Green", "Yellow", "Red"].map(k => counts[k] > 0 && (
          <div key={k} style={{ width: (100 * counts[k]) / total + "%", background: RISK_HEX[k] }} title={`${k}: ${counts[k]}`} />
        ))}
      </div>
      <div className="mt-1 flex gap-4 text-xs text-slate-700">
        {["Green", "Yellow", "Red"].map(k => <span key={k}><span className="inline-block h-2 w-2 rounded-full mr-1" style={{ background: RISK_HEX[k] }}></span>{k} {counts[k]}</span>)}
      </div>
    </div>
  );
}

const MAX_FILE_MB = 10;
async function uploadFiles(fileList, accountId) {
  const out = [];
  for (const f of Array.from(fileList || [])) {
    if (f.size > MAX_FILE_MB * 1024 * 1024) throw new Error(`${f.name} is over ${MAX_FILE_MB} MB`);
    const path = `${accountId}/${Date.now()}-${f.name.replace(/[^\w.\-]+/g, "_")}`;
    const { error } = await sb.storage.from("attachments").upload(path, f);
    if (error) throw new Error(`${f.name}: ${error.message}`);
    const { data } = sb.storage.from("attachments").getPublicUrl(path);
    out.push({ name: f.name, url: data.publicUrl, path });
  }
  return out;
}

function Dashboard({ st, scored, all, allAccounts, scope, setScopeSel, myCount, renewalsDue, user, dispatch, openAccount }) {
  const totalARR = scored.reduce((s, a) => s + a.arrUSD, 0);
  const atRisk = scored.filter(a => a.risk === "Red");
  const arrAtRisk = atRisk.reduce((s, a) => s + a.arrUSD, 0);
  const weekTasks = st.tasks.filter(t => t.status !== "Done" && daysUntil(t.due) <= 7 && (scope !== "mine" || t.owner === user.name));
  const buckets = [30, 60, 90].map(n => scored.filter(a => { const d = daysUntil(a.renewalDate); return d >= 0 && d <= n && (n === 30 || d > n - 30); }));
  const counts = { Green: 0, Yellow: 0, Red: 0 };
  scored.forEach(a => counts[a.risk]++);
  const flagged = scored.filter(a => a.flags.length);
  // trailing-12-month revenue retention (USD, from churn events and renewal deltas);
  // when "All" is selected this always spans every account, regardless of other scoping
  const rates = st.settings.rates;
  const yearAgo = Date.now() - 365 * DAY;
  const retAccounts = scope === "all" ? allAccounts : all;
  let churnedARR = 0, expansion = 0, contraction = 0;
  retAccounts.forEach(a => {
    if (a.churn && new Date(a.churn.date).getTime() >= yearAgo) churnedARR += toUSD(a.churn.arr, a.churn.currency || a.currency, rates);
    (a.renewals || []).forEach(r => {
      if (new Date(r.completedOn).getTime() >= yearAgo) {
        const d = toUSD(r.arr - r.prevArr, a.currency, rates);
        if (d >= 0) expansion += d; else contraction -= d;
      }
    });
    (a.arrEvents || []).forEach(ev => { // won opportunities + manual ARR adjustments
      if (new Date(ev.date).getTime() >= yearAgo) {
        const d = toUSD(ev.delta, a.currency, rates);
        if (d >= 0) expansion += d; else contraction -= d;
      }
    });
  });
  const retARR = retAccounts.reduce((s, a) => s + (a.churn ? 0 : a.arrUSD), 0);
  const base = retARR + churnedARR - expansion + contraction;
  const pct = x => (100 * x).toFixed(0) + "%";
  const grr = base > 0 ? (base - churnedARR - contraction) / base : null;
  const nrr = base > 0 ? (base - churnedARR - contraction + expansion) / base : null;
  // per-person open-task rollup (whole team, regardless of scope)
  const byOwner = {};
  st.tasks.filter(t => t.status !== "Done").forEach(t => {
    const o = t.owner || "Unassigned";
    byOwner[o] = byOwner[o] || { open: 0, overdue: 0, next: null };
    byOwner[o].open++;
    if (daysUntil(t.due) < 0) byOwner[o].overdue++;
    if (!byOwner[o].next || t.due < byOwner[o].next) byOwner[o].next = t.due;
  });
  const owners = Object.entries(byOwner).sort((x, y) => y[1].overdue - x[1].overdue || y[1].open - x[1].open);
  return (
    <div className="space-y-3">
      {scored.length === 0 && <div className="nm-sm p-4 text-sm text-indigo-500">
        {scope === "mine" ? <>No accounts assigned to you yet — switch to <b>All</b> (top right) or assign yourself as CSM on an account.</>
          : <>Fresh start — no accounts yet. Head to <b>Accounts</b> (press <kbd className="rounded border border-indigo-300 px-1">2</kbd>) and click <b>+ New account</b>, import a JSON backup, or load sample data from Settings.</>}
      </div>}
      <div className="grid grid-cols-3 gap-3">
        <Stat label={`Total ARR (USD)${scope === "mine" ? " · my book" : ""}`} value={fmtMoney(totalARR)} sub={`${scored.length} active accounts`} />
        <Stat label="ARR at risk (USD)" value={fmtMoney(arrAtRisk)} tone="text-rose-600" sub={`${atRisk.length} red accounts`} />
        <Stat label="At-risk accounts" value={atRisk.length} tone="text-rose-600" sub="health score below 40" />

function exportCSV(rows) {
  const cols = ["name", "tier", "arr", "currency", "arrUSD", "industry", "csm", "renewalDate", "daysToRenewal", "score", "risk", "contractStatus"];
  const esc = v => `"${String(v).replace(/"/g, '""')}"`;
  const csv = [cols.join(","), ...rows.map(a => cols.map(c => esc(c === "daysToRenewal" ? daysUntil(a.renewalDate) : c === "arrUSD" ? Math.round(a.arrUSD) : a[c])).join(","))].join("\n");
  const url = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
  const el = Object.assign(document.createElement("a"), { href: url, download: "accounts.csv" });
  el.click(); URL.revokeObjectURL(url);
}
function parseCSV(text) {
  const rows = []; let row = [], cur = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ",") { row.push(cur); cur = ""; }
    else if (ch === "\n" || ch === "\r") {
      if (ch === "\r" && text[i + 1] === "\n") i++;
      row.push(cur); rows.push(row); row = []; cur = "";
    } else cur += ch;
  }
  if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ""));
}
function importAccountsCSV(file, dispatch, done) {
  const reader = new FileReader();
  reader.onload = () => {
    const rows = parseCSV(String(reader.result));
    if (rows.length < 2) return done({ ok: 0, skipped: 0, err: "No data rows found — the first row must be a header (name, tier, arr, …)." });
    const norm = s => s.toLowerCase().replace(/[^a-z]/g, "");
    const header = rows[0].map(norm);
    const col = (r, key) => { const i = header.indexOf(key); return i >= 0 ? (r[i] || "").trim() : ""; };
    if (header.indexOf("name") < 0) return done({ ok: 0, skipped: 0, err: 'The header row needs a "name" column (matching Export CSV format works).' });
    let ok = 0, skipped = 0;
    rows.slice(1).forEach(r => {
      const name = col(r, "name");
      if (!name) { skipped++; return; }
      const num = (key, dflt) => { const v = parseFloat(col(r, key)); return isNaN(v) ? dflt : v; };
      const date = v => { const d = new Date(v); return v && !isNaN(d) ? iso(d.getTime()) : null; };
      dispatch({ type: "ADD_ACCOUNT", item: {
        id: uid(), name,
        tier: ["Enterprise", "Mid", "SMB"].find(t => t.toLowerCase() === col(r, "tier").toLowerCase()) || "Mid",
        arr: Math.max(0, num("arr", 0)),
        currency: CURRENCIES.includes(col(r, "currency").toUpperCase()) ? col(r, "currency").toUpperCase() : "USD",
        industry: col(r, "industry"), csm: col(r, "csm"),
        startDate: date(col(r, "startdate")) || iso(Date.now()),
        renewalDate: date(col(r, "renewaldate")) || addDays(365),
        contractStatus: ["Active", "Auto-renew", "In negotiation", "Churn risk"].find(s => s.toLowerCase() === col(r, "contractstatus").toLowerCase()) || "Active",
        inputs: { usage: num("usage", 70), sentiment: num("sentiment", 70), tickets: num("tickets", 0), nps: num("nps", 0) },
        history: [], inputsUpdatedAt: iso(Date.now()),
      } });
      ok++;
    });
    done({ ok, skipped });
  };
  reader.readAsText(file);
}

              </div>
              {x.details && <div className="ml-[76px] mt-1 whitespace-pre-wrap text-xs text-slate-600">{x.details}</div>}
              {x.attachments && x.attachments.length > 0 && <div className="ml-[76px] mt-1"><AttachmentLinks items={x.attachments} /></div>}
            </div>
          ))}
        </Card>
        <Card title={`Opportunities (${opps.filter(o => !["Won", "Lost"].includes(o.stage)).length} open)`}>
          {opps.length === 0 && <div className="text-sm text-slate-500">None.</div>}
          {opps.map(o => (
            <div key={o.id} className={`flex items-center gap-3 border-b border-slate-100 py-1.5 text-sm last:border-0 ${["Won", "Lost"].includes(o.stage) ? "opacity-60" : ""}`}>
              <span className="rounded bg-indigo-50 px-1.5 py-0.5 text-xs font-semibold text-indigo-600">{o.type}</span>
              <span className="flex-1 font-medium">{fmtMoney(o.value, a.currency)}</span>
              <Select value={o.stage} options={["Discovery", "Proposal", "Negotiation", "Stalled", "Won", "Lost"]}
                className="!px-2 !py-0.5 text-xs" onChange={e => {
                  const stage = e.target.value;
                  if (stage === o.stage) return;
                  if (stage === "Won") {
                    if (!confirm(`Mark this ${o.type} as WON and book ${fmtMoney(o.value, a.currency)} expansion ARR onto ${a.name}?`)) return;
                    dispatch({ type: "SET_OPP_STAGE", id: o.id, stage });
                    dispatch({ type: "ADJUST_ARR", id: a.id, newArr: a.arr + o.value,
                      entry: { id: uid(), date: iso(Date.now()), delta: o.value, kind: "expansion", source: "opportunity", reason: `${o.type} won`, note: "", by: user.name } });
                    dispatch({ type: "ADD_ACTIVITY", item: { id: uid(), accountId: a.id, type: "note", date: iso(Date.now()),
                      summary: `Opportunity WON — ${fmtMoney(o.value, a.currency)} ${o.type} · ARR now ${fmtMoney(a.arr + o.value, a.currency)} · by ${user.name}` } });
                  } else if (o.stage === "Won") {
                    if (!confirm("This opportunity was already booked as Won expansion. Changing its stage does NOT reverse the ARR — use ⇄ Adjust ARR for that. Continue?")) return;
                    dispatch({ type: "SET_OPP_STAGE", id: o.id, stage });
                  } else {
                    dispatch({ type: "SET_OPP_STAGE", id: o.id, stage });
                  }
                }} />
              <span className="text-xs text-slate-500">close {fmtDate(o.closeDate)}</span>
            </div>
          ))}
        </Card>
      </div>
      {(() => {
        const events = [
          ...(a.renewals || []).map(r => ({ id: r.id, date: r.completedOn, sort: r.completedOn, kind: "renewal", r })),
          ...(a.arrEvents || []).map(ev => ({ id: ev.id, date: ev.date, sort: ev.date, kind: ev.kind, ev })),
          ...(a.churn ? [{ id: "churn", date: a.churn.date, sort: a.churn.date, kind: "churn" }] : []),
        ].sort((x, y) => y.sort.localeCompare(x.sort));
        return (
          <Card title={`Revenue history (${events.length})`}>
            {events.length === 0 && <div className="text-sm text-slate-500">No revenue events yet — renewals, won opportunities, ARR adjustments and churn all land here.</div>}
            {events.map(e => (
              <div key={e.id} className="flex flex-wrap items-center gap-3 border-b border-slate-100 py-1.5 text-sm last:border-0">
                {e.kind === "renewal" && <>
                  <span className="rounded bg-emerald-100 px-1.5 py-0.5 text-xs font-semibold text-emerald-700">✓ renewed</span>
                  <span className="text-slate-800">{fmtDate(e.date)}</span>
                  <span className="flex-1 text-xs text-slate-700">term extended {fmtDate(e.r.from)} → <b>{fmtDate(e.r.to)}</b></span>
                  <span className="text-xs">{fmtMoney(e.r.arr, a.currency)}{e.r.arr !== e.r.prevArr && <span className={e.r.arr > e.r.prevArr ? "ml-1 text-emerald-600" : "ml-1 text-rose-600"}>({e.r.arr > e.r.prevArr ? "▲" : "▼"} from {fmtMoney(e.r.prevArr, a.currency)})</span>}</span>
                  <span className="text-xs text-slate-500">by {e.r.by}</span>
                </>}
                {(e.kind === "expansion" || e.kind === "contraction") && <>
                  <span className={`rounded px-1.5 py-0.5 text-xs font-semibold ${e.kind === "expansion" ? "bg-emerald-100 text-emerald-700" : "bg-rose-100 text-rose-600"}`}>{e.kind === "expansion" ? "▲ expansion" : "▼ reduction"}</span>
                  <span className="text-slate-800">{fmtDate(e.date)}</span>
                  <span className="flex-1 text-xs text-slate-700">{e.ev.reason}{e.ev.note ? ` — ${e.ev.note}` : ""}{e.ev.source === "opportunity" ? " (from opportunity)" : ""}</span>
                  <span className={`text-xs font-bold ${e.ev.delta > 0 ? "text-emerald-600" : "text-rose-600"}`}>{e.ev.delta > 0 ? "+" : "−"}{fmtMoney(Math.abs(e.ev.delta), a.currency)}</span>
                  <span className="text-xs text-slate-500">by {e.ev.by}</span>
                </>}
                {e.kind === "churn" && <>
                  <span className="rounded bg-rose-500 px-1.5 py-0.5 text-xs font-bold text-white">✖ churned</span>
                  <span className="text-slate-800">{fmtDate(e.date)}</span>
                  <span className="flex-1 text-xs text-slate-700">{a.churn.reason}{a.churn.note ? ` — ${a.churn.note}` : ""}</span>
                  <span className="text-xs font-bold text-rose-600">−{fmtMoney(a.churn.arr, a.churn.currency || a.currency)}</span>
                  <span className="text-xs text-slate-500">by {a.churn.by}</span>
                </>}
              </div>
            ))}
          </Card>
        );
      })()}
    </div>
  );
}

/* ------------------------------- Renewals ------------------------------- */
function Renewals({ scored, openAccount }) {
  const months = [];
  const now = new Date(); now.setDate(1);
  for (let i = 0; i < 12; i++) {
    const m = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const key = m.toISOString().slice(0, 7);
    months.push({ key, label: m.toLocaleDateString("en-US", { month: "short", year: "numeric" }), items: scored.filter(a => a.renewalDate.slice(0, 7) === key) });
  }
  return (
    <div className="flex gap-3 overflow-x-auto pb-3">
      {months.map(m => (
        <div key={m.key} className="nm w-56 shrink-0 p-4">
          <div className="mb-2 flex justify-between text-xs font-semibold text-slate-700">
            <span>{m.label}</span><span>{m.items.length ? fmtMoney(m.items.reduce((s, a) => s + a.arrUSD, 0)) + " USD" : ""}</span>
          </div>
          {m.items.length === 0 && <div className="text-xs italic text-slate-400">—</div>}
          {m.items.map(a => (
            <button key={a.id} onClick={() => openAccount(a.id)} className="nm-sm mb-3 w-full p-2.5 text-left hover:bg-slate-50">
              <div className="flex items-center justify-between text-sm font-medium">{a.name}<HealthChip score={a.score} /></div>
              <div className="mt-0.5 text-xs text-slate-700">{fmtMoney(a.arr, a.currency)} · {a.contractStatus} · {daysUntil(a.renewalDate)}d</div>
            </button>
          ))}
        </div>
      ))}
    </div>
  );
}

/* ------------------------------- Settings ------------------------------- */
function Settings({ st, dispatch, user }) {
  const w = st.settings.weights;
  const rates = st.settings.rates;
  const total = Object.values(w).reduce((a, b) => a + b, 0);
  const fileRef = useRef();
  const setW = (k, v) => dispatch({ type: "SET_WEIGHTS", weights: { ...w, [k]: +v } });
  const doExport = () => {
    const url = URL.createObjectURL(new Blob([JSON.stringify(st, null, 2)], { type: "application/json" }));
    const el = Object.assign(document.createElement("a"), { href: url, download: "crm-data.json" });
    el.click(); URL.revokeObjectURL(url);
  };
  const bulkReplace = async state => {
    try { await replaceAllRemote(state); dispatch({ type: "REPLACE", state: { ...state, team: st.team } }); }
    catch (ex) { alert("Bulk update failed: " + ex.message); }
  };
  const doImport = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = async () => { try { const s = JSON.parse(r.result); if (!s.accounts || !s.settings) throw 0; await bulkReplace(s); alert("Imported for the whole team."); } catch (ex) { alert(ex && ex.message ? "Import failed: " + ex.message : "Invalid JSON file."); } };
    r.readAsText(f); e.target.value = "";
  };
  return (
    <div className="grid gap-4 lg:grid-cols-2">
      <Card title="Health score weights">
        <div className="nm-inset mb-3 p-3 font-mono text-xs text-slate-700">
          score = {Object.keys(w).map(k => `${(100 * w[k] / total).toFixed(0)}%·${k}`).join(" + ")}
        </div>
        {Object.keys(w).map(k => (
          <div key={k} className="mb-2 flex items-center gap-3 text-sm">
            <span className="w-40">{WEIGHT_LABELS[k]}</span>
            <input type="range" min="0" max="100" value={w[k]} onChange={e => setW(k, e.target.value)} className="flex-1" />
            <span className="w-12 text-right font-mono text-xs">{(100 * w[k] / total).toFixed(0)}%</span>
          </div>
        ))}
        <div className="mt-2 text-xs text-slate-500">Weights are normalized automatically — set relative importance; effective % is shown. Scores update everywhere instantly.</div>
      </Card>
      <Card title="Currency conversion (to USD)">
        {CURRENCIES.filter(c => c !== "USD").map(c => (
          <div key={c} className="mb-2 flex items-center gap-2 text-sm">
            <span className="w-24">1 {c} ({CUR_SYM[c]}) =</span>
            <Input type="number" step="0.0001" min="0" value={rates[c]}
              onChange={e => dispatch({ type: "SET_RATES", rates: { ...rates, [c]: +e.target.value || 0 } })} className="w-28" />
            <span className="text-slate-700">USD</span>
          </div>
        ))}
        <p className="mt-2 text-xs text-slate-500">Each account is billed in its own currency; the dashboard, renewal totals, ARR sorting and the CSV's <code>arrUSD</code> column convert with these rates. Account rows and detail pages keep the native amount.</p>
      </Card>
      <UsersCard me={user} />
      <Card title="Data">
        <div className="flex flex-wrap gap-2">
          <Btn kind="primary" onClick={doExport}>Export JSON</Btn>
          <Btn onClick={() => fileRef.current.click()}>Import JSON</Btn>
          <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={doImport} />
          <Btn onClick={() => { if (confirm("Replace the team's data with the sample dataset? This affects everyone.")) bulkReplace(seedData()); }}>Load sample data</Btn>
          <Btn onClick={() => { if (confirm("Delete ALL of the team's accounts and data? Export JSON first if you want a backup.")) bulkReplace(emptyData()); }}>Clear all data</Btn>
        </div>
        <p className="mt-3 text-xs text-slate-700">Data is shared by the whole team in your Supabase project. Export JSON any time for a backup; Import replaces everything for everyone (admin only).</p>
      </Card>
    </div>
  );
}

function AuthScreen() {
  const [mode, setMode] = useState("signin"); // signin | signup | reset
  const [name, setName] = useState(""); const [email, setEmail] = useState(""); const [pass, setPass] = useState("");
  const [err, setErr] = useState(""); const [msg, setMsg] = useState(""); const [busy, setBusy] = useState(false);
  const submit = async e => {
    e.preventDefault(); setErr(""); setMsg(""); setBusy(true);
    try {
      if (mode === "signup") {
        const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { name: name.trim() || email.split("@")[0] } } });
        if (error) throw error;
        setMsg("Account created. If nothing happens, check your email for a confirmation link, then sign in.");
        setMode("signin");
      } else if (mode === "reset") {
        const { error } = await sb.auth.resetPasswordForEmail(email);
        if (error) throw error;
        setMsg("Password-reset email sent (check spam too).");
        setMode("signin");
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;
      }
    } catch (ex) { setErr(ex.message); }
    setBusy(false);
  };
  return (
    <div className="flex min-h-screen items-center justify-center p-4">
      <form onSubmit={submit} className="nm w-full max-w-sm p-8">
        <h1 className="text-xl font-bold tracking-tight">CS<span className="text-indigo-600">CRM</span></h1>
        <p className="mb-4 mt-1 text-xs text-slate-700">
          {mode === "signup" ? "Create your account — the first person to sign up becomes admin." :
           mode === "reset" ? "We'll email you a password-reset link." : "Sign in with your team account."}
        </p>
        {mode === "signup" && <label className="mb-2 block text-xs font-semibold text-slate-700">Your name
          <Input value={name} onChange={e => setName(e.target.value)} className="mt-1" autoFocus /></label>}
        <label className="mb-2 block text-xs font-semibold text-slate-700">Email
          <Input type="email" required value={email} onChange={e => { setEmail(e.target.value); setErr(""); }} className="mt-1" autoFocus={mode !== "signup"} /></label>
        {mode !== "reset" && <label className="mb-2 block text-xs font-semibold text-slate-700">Password
          <Input type="password" required minLength={6} value={pass} onChange={e => { setPass(e.target.value); setErr(""); }} className="mt-1" /></label>}
        {err && <div className="mb-2 rounded bg-rose-50 px-2 py-1 text-xs text-rose-600">{err}</div>}
        {msg && <div className="mb-2 rounded bg-emerald-50 px-2 py-1 text-xs text-emerald-700">{msg}</div>}
        <button type="submit" disabled={busy} className="grad mt-3 w-full py-2.5 text-sm font-bold text-white disabled:opacity-50">
          {busy ? "…" : mode === "signup" ? "Sign up" : mode === "reset" ? "Send reset link" : "Sign in"}</button>
        <div className="mt-3 flex justify-between text-xs text-indigo-600">
          <button type="button" className="hover:underline" onClick={() => { setMode(mode === "signup" ? "signin" : "signup"); setErr(""); setMsg(""); }}>
            {mode === "signup" ? "Have an account? Sign in" : "New here? Sign up"}</button>
          {mode === "signin" && <button type="button" className="hover:underline" onClick={() => { setMode("reset"); setErr(""); setMsg(""); }}>Forgot password?</button>}
        </div>
        <p className="mt-3 text-[11px] leading-4 text-slate-500">Shared team CRM — data lives in your team's Supabase project. Roles: admins manage settings and users; everyone else works with accounts.</p>
      </form>
    </div>
  );
}
function UsersCard({ me }) {
  const [users, setUsers] = useState([]);
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);
  const [v, setV] = useState({ name: "", email: "", pass: "", role: "user" });
  const load = () => sb.from("profiles").select("id,name,role,created_at").order("created_at").then(({ data, error }) => error ? setErr(error.message) : setUsers(data || []));
  useEffect(() => { load(); }, []);
  const setRole = async (u, role) => {
    setErr(""); setMsg("");
    const { error } = await sb.from("profiles").update({ role }).eq("id", u.id);
    if (error) setErr(error.message); else load();
  };
  const [editing, setEditing] = useState(null); // {id, name}
  const renameEverywhere = async (oldName, newName) => {
    // keep account CSM assignments and task owners in sync with the new name
    for (const [t, key] of [["accounts", "csm"], ["tasks", "owner"]]) {
      const { data } = await sb.from(t).select("id,data");
      for (const row of data || []) {
        if (row.data && row.data[key] === oldName) {
          row.data[key] = newName;
          const { error } = await sb.from(t).upsert({ id: row.id, data: row.data });
          if (error) throw error;
        }
      }
    }
  };
  const saveRename = async u => {
    const newName = editing.name.trim();
    setErr(""); setMsg("");
    if (!newName) return setErr("Name cannot be empty.");
    if (newName === u.name) return setEditing(null);
    if (users.some(x => x.id !== u.id && x.name === newName)) return setErr("That name is already taken.");
    setBusy(true);
    try {
      const { error } = await sb.from("profiles").update({ name: newName }).eq("id", u.id);
      if (error) throw error;
      await renameEverywhere(u.name, newName);
      setMsg(`Renamed ${u.name} → ${newName}; their accounts and tasks were updated too.`);
      setEditing(null); load();
    } catch (ex) { setErr(ex.message); }
    setBusy(false);
  };
  const addUser = async e => {
    e.preventDefault(); setErr(""); setMsg("");
    if (!v.name.trim() || !v.email.trim()) return setErr("Name and email are required.");
    if (v.pass.length < 6) return setErr("Temporary password must be at least 6 characters.");
    setBusy(true);
    try {
      // separate throwaway client so creating the user does NOT switch our own session
      const tmp = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false, autoRefreshToken: false } });
      const { data, error } = await tmp.auth.signUp({ email: v.email.trim(), password: v.pass, options: { data: { name: v.name.trim() } } });
      if (error) throw error;
      if (v.role === "admin" && data.user) {
        const { error: e2 } = await sb.from("profiles").update({ role: "admin" }).eq("id", data.user.id);
        if (e2) throw e2;
      }
      setMsg(`${v.name.trim()} added as ${v.role}. Share the email + temporary password with them (they can change it via "Forgot password?"). If email confirmation is enabled in Supabase, they must click the confirmation link first.`);
      setV({ name: "", email: "", pass: "", role: "user" });
      load();
    } catch (ex) { setErr(ex.message); }
    setBusy(false);
  };
  return (
    <Card title={`Users (${users.length})`}>
      {users.map(u => (
        <div key={u.id} className="flex items-center gap-2 border-b border-slate-100 py-1.5 text-sm last:border-0">
          {editing && editing.id === u.id ? (
            <span className="flex flex-1 items-center gap-2">
              <Input autoFocus value={editing.name} onChange={e => setEditing({ ...editing, name: e.target.value })}
                onKeyDown={e => { if (e.key === "Enter") { e.preventDefault(); saveRename(u); } if (e.key === "Escape") setEditing(null); }} className="w-44 !py-0.5" />
              <button className="text-xs font-bold text-indigo-600 hover:underline" onClick={() => saveRename(u)}>{busy ? "…" : "save"}</button>
              <button className="text-xs text-slate-500 hover:underline" onClick={() => setEditing(null)}>cancel</button>
            </span>
          ) : (
            <span className="flex-1">{u.name}{u.id === me.id && <span className="text-xs text-slate-500"> (you)</span>}
              <button title="Rename user" className="ml-2 text-xs text-indigo-500 hover:text-indigo-700" onClick={() => { setErr(""); setMsg(""); setEditing({ id: u.id, name: u.name }); }}>✎</button>
            </span>
          )}
          <span className={`rounded px-1.5 py-0.5 text-xs font-semibold ${u.role === "admin" ? "bg-indigo-50 text-indigo-600" : "bg-slate-100 text-slate-700"}`}>{u.role}</span>
          {u.id !== me.id && (u.role === "user"
            ? <button className="text-xs text-indigo-600 hover:underline" onClick={() => setRole(u, "admin")}>make admin</button>
            : <button className="text-xs text-rose-500 hover:underline" onClick={() => setRole(u, "user")}>demote</button>)}
        </div>
      ))}
      <form onSubmit={addUser} className="mt-3 flex flex-wrap items-center gap-2">
        <Input placeholder="Name" value={v.name} onChange={e => setV({ ...v, name: e.target.value })} className="w-32" />
        <Input placeholder="Email" type="email" value={v.email} onChange={e => setV({ ...v, email: e.target.value })} className="w-52" />
        <Input placeholder="Temp password" type="text" value={v.pass} onChange={e => setV({ ...v, pass: e.target.value })} className="w-36" />
        <Select value={v.role} onChange={e => setV({ ...v, role: e.target.value })} options={["user", "admin"]} />
        <Btn kind="primary" type="submit">{busy ? "Adding…" : "Add user"}</Btn>
      </form>
      {err && <div className="mt-2 rounded bg-rose-50 px-2 py-1 text-xs text-rose-600">{err}</div>}
      {msg && <div className="mt-2 rounded bg-emerald-50 px-2 py-1 text-xs text-emerald-700">{msg}</div>}
      <p className="mt-2 text-xs text-slate-500">Add any number of users or admins. At least one admin always remains (enforced by the database). Colleagues can also self-sign-up from the login screen (they start as <b>user</b>). To remove someone entirely: Supabase dashboard → Authentication → Users.</p>
    </Card>
  );
}

  Accounts: <NavIcon><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></NavIcon>,
  Renewals: <NavIcon><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></NavIcon>,
  Settings: <NavIcon><line x1="4" y1="21" x2="4" y2="14" /><line x1="4" y1="10" x2="4" y2="3" /><line x1="12" y1="21" x2="12" y2="12" /><line x1="12" y1="8" x2="12" y2="3" /><line x1="20" y1="21" x2="20" y2="16" /><line x1="20" y1="12" x2="20" y2="3" /><line x1="1" y1="14" x2="7" y2="14" /><line x1="9" y1="8" x2="15" y2="8" /><line x1="17" y1="16" x2="23" y2="16" /></NavIcon>,
};
const VIEWS = ["Dashboard", "Accounts", "Renewals", "Settings"];
function App({ user }) {
  const views = user.role === "admin" ? VIEWS : VIEWS.filter(v => v !== "Settings");
  const [st, setSt] = useState(emptyData);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState("Dashboard");
  const [acctId, setAcctId] = useState(null);
  const searchRef = useRef();
  const dispatch = useCallback(action => setSt(prev => {
    const next = reducer(prev, action);
    if (action.type !== "REPLACE") persist(action, next);
    return next;
  }), []);
  const refetch = useCallback(() => fetchAll()
    .then(s => { setSt(s); setLoaded(true); })
    .catch(e => { console.error(e); alert("Could not load shared data: " + e.message); }), []);
  useEffect(() => { refetch(); }, [refetch]);
  useEffect(() => { // live updates from teammates: debounce, then refetch everything (data is small)
    let timer = null;
    const ch = sb.channel("crm-live").on("postgres_changes", { event: "*", schema: "public" },
      () => { clearTimeout(timer); timer = setTimeout(refetch, 800); }).subscribe();
    return () => { clearTimeout(timer); sb.removeChannel(ch); };
  }, [refetch]);
  useEffect(() => {
    const h = e => {
      if (["INPUT", "SELECT", "TEXTAREA"].includes(e.target.tagName)) return;
      if (e.key === "/") { e.preventDefault(); setView("Accounts"); setAcctId(null); setTimeout(() => searchRef.current?.focus(), 50); }
      const i = "12345".indexOf(e.key);
      if (i >= 0 && i < views.length) { setView(views[i]); setAcctId(null); }
      if (e.key === "Escape") setAcctId(null);
    };
    window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
  }, []);
  const scored = useMemo(() => st.accounts.map(a => {
    const score = healthScore(a, st.activities, st.settings.weights);
    return { ...a, score, risk: riskOf(score), flags: flagsFor(a, st.activities, score), arrUSD: toUSD(a.arr, a.currency, st.settings.rates) };
  }), [st]);
  const [scopeSel, setScopeSel] = useState(null);
  const [collapsed, setCollapsed] = useState(() => { try { return localStorage.getItem("crm-nav") === "1"; } catch (e) { return false; } });
  useEffect(() => { try { localStorage.setItem("crm-nav", collapsed ? "1" : "0"); } catch (e) {} }, [collapsed]);
  const myCount = scored.filter(a => a.csm === user.name).length;
  const scope = scopeSel ?? (myCount > 0 ? "mine" : "all");
  const visible = scope === "mine" ? scored.filter(a => a.csm === user.name) : scored; // includes churned
  const active = visible.filter(a => !a.churn);
  const openAccount = id => { setView("Accounts"); setAcctId(id); };
  const [notifOpen, setNotifOpen] = useState(false);
  const renewalsDue = active
    .filter(a => { const d = daysUntil(a.renewalDate); return d >= 0 && d <= 30; })
    .sort((x, y) => daysUntil(x.renewalDate) - daysUntil(y.renewalDate));
  return (
    <div className="flex min-h-screen">
      <aside className={`fixed inset-y-0 left-0 z-30 flex flex-col border-r border-slate-200 bg-white transition-all ${collapsed ? "w-14" : "w-52"}`}>
        <div className={`flex items-center pb-4 pt-5 ${collapsed ? "justify-center px-0" : "justify-between px-5"}`}>
          {!collapsed && <span className="text-lg font-extrabold tracking-tight text-slate-900">CS<span className="text-indigo-600">CRM</span></span>}
          <button title={collapsed ? "Expand sidebar" : "Collapse sidebar"} onClick={() => setCollapsed(c => !c)}
            className="rounded-md p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-700">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              {collapsed ? <polyline points="9 18 15 12 9 6" /> : <polyline points="15 18 9 12 15 6" />}
            </svg>
          </button>
        </div>
        <nav className={`flex-1 space-y-0.5 ${collapsed ? "px-2" : "px-3"}`}>
          {views.map(v => (
            <button key={v} title={v} onClick={() => { setView(v); setAcctId(null); }}
              className={`flex w-full items-center rounded-lg py-2 text-sm font-medium ${collapsed ? "justify-center px-0" : "gap-2.5 px-3"} ${view === v ? "bg-indigo-50 font-semibold text-indigo-700" : "text-slate-600 hover:bg-slate-100 hover:text-slate-900"}`}>
              {NAV_ICONS[v]}{!collapsed && <span className="flex-1 text-left">{v}</span>}
            </button>
          ))}
        </nav>
        <div className={`border-t border-slate-200 ${collapsed ? "p-2" : "p-4"}`}>
          {!collapsed && <>
            <div className="truncate text-sm font-semibold text-slate-900">{user.name}</div>
            <div className="text-xs text-slate-500">{user.role}{loaded ? "" : " · loading…"}</div>
          </>}
          <button title={`Sign out (${user.name})`} className={`nm-btn text-xs font-semibold text-slate-600 ${collapsed ? "flex h-9 w-9 items-center justify-center" : "mt-3 w-full px-3 py-1.5"}`}
            onClick={() => sb.auth.signOut()}>{collapsed ? "⎋" : "Sign out"}</button>
        </div>
      </aside>
      <main className={`${collapsed ? "ml-14" : "ml-52"} min-w-0 flex-1 px-6 py-5 transition-all`}>
      <div className="mb-5 flex items-center gap-3">
        <h1 className="text-xl font-bold tracking-tight text-slate-900">{view === "Accounts" && acctId ? "Account detail" : view}</h1>
        <div className="nm-inset ml-3 flex items-center gap-0.5 !rounded-lg p-0.5">
          {[["mine", `My book${myCount ? ` (${myCount})` : ""}`], ["all", "All"]].map(([k, label]) => (
            <button key={k} onClick={() => setScopeSel(k)}
              className={`rounded-md px-3 py-1 text-xs font-semibold ${scope === k ? "bg-indigo-600 text-white shadow-sm" : "text-slate-600 hover:text-slate-900"}`}>{label}</button>
          ))}
        </div>
        <div className="relative ml-1">
          <button onClick={() => setNotifOpen(o => !o)} title="Renewals due within 30 days"
            className="nm-btn relative flex h-9 w-9 items-center justify-center text-base">🔔
            {renewalsDue.length > 0 && <span className="absolute -right-0.5 -top-0.5 flex h-4 min-w-[16px] items-center justify-center rounded-full bg-rose-500 px-1 text-[11px] font-bold text-white">{renewalsDue.length}</span>}
          </button>
          {notifOpen && (
            <div className="nm absolute right-0 z-20 mt-2 w-80 p-3">
              <div className="px-2 py-1 text-xs font-semibold text-slate-700">Renewals due within 30 days</div>
              {renewalsDue.length === 0 && <div className="px-2 py-2 text-sm text-slate-500">Nothing due in the next 30 days. 🎉</div>}
              {renewalsDue.map(a => (
                <button key={a.id} onClick={() => { setNotifOpen(false); openAccount(a.id); }}
                  className="flex w-full items-center justify-between rounded px-2 py-1.5 text-left text-sm hover:bg-slate-50">
                  <span className="font-medium">{a.name}</span>
                  <span className="flex items-center gap-2 text-xs">
                    <span className="text-slate-700">{fmtDate(a.renewalDate)}</span>
                    <span className={`rounded px-1.5 py-0.5 font-semibold ${daysUntil(a.renewalDate) <= 7 ? "bg-rose-100 text-rose-700" : "bg-amber-100 text-amber-700"}`}>{daysUntil(a.renewalDate)}d</span>
                  </span>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
      {view === "Dashboard" && <Dashboard st={st} scored={active} all={visible} allAccounts={scored} scope={scope} setScopeSel={setScopeSel} myCount={myCount} renewalsDue={renewalsDue} user={user} dispatch={dispatch} openAccount={openAccount} />}
      {view === "Accounts" && (acctId
        ? <AccountDetail st={st} scored={scored} id={acctId} dispatch={dispatch} back={() => setAcctId(null)} user={user} team={st.team} />
        : <AccountList scored={visible} openAccount={openAccount} searchRef={searchRef} dispatch={dispatch} team={st.team} />)}
      {view === "Renewals" && <Renewals scored={active} openAccount={openAccount} />}
      {view === "Settings" && user.role === "admin" && <Settings st={st} dispatch={dispatch} user={user} />}
      </main>
    </div>
  );
}
function Root() {
  const [ready, setReady] = useState(false);
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  useEffect(() => {
    if (!CONFIGURED) return;
    sb.auth.getSession().then(({ data }) => { setSession(data.session); setReady(true); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);
  useEffect(() => {
    if (!session) { setProfile(null); return; }
    sb.from("profiles").select("id,name,role").eq("id", session.user.id).single()
      .then(({ data, error }) => error ? alert("Could not load your profile: " + error.message) : setProfile(data));
  }, [session]);
  if (!CONFIGURED) return <SetupScreen />;
  if (!ready) return <div className="flex min-h-screen items-center justify-center text-sm text-slate-500">Loading…</div>;
  if (!session) return <AuthScreen />;
  if (!profile) return <div className="flex min-h-screen items-center justify-center text-sm text-slate-500">Loading profile…</div>;
  return <App user={profile} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
